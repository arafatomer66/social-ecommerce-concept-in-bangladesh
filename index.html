  );
}
Object.assign(window, { BargainScreen });

</script>
<script type="text/babel" data-source="sd-redenvelope.jsx">
// ShareDeal — Red Envelope (লাল খাম / Hong Bao)
// Post-purchase social loop: after every order, user gets a shareable envelope.
// Friends each grab a random ৳ amount. They MUST install/open ShareDeal to claim.
function RedEnvelopeScreen({ orderId, total, onBack, onNav }) {
  const lang = useLang();
  const totalPool = Math.max(80, Math.round((total || 619) * 0.18));
  const slots = 8;

  // Generate randomized but fixed slot values that sum to totalPool
  const slotValues = React.useMemo(() => {
    const seed = (orderId || "ORD-2026-001").split("").reduce((a, c) => a + c.charCodeAt(0), 0);
    const rng = (i) => ((Math.sin(seed + i * 13) + 1) / 2);
    const raw = Array.from({ length: slots }, (_, i) => Math.max(1, Math.round(rng(i) * 100)));
    const sum = raw.reduce((a, b) => a + b, 0);
    return raw.map(v => Math.max(5, Math.round((v / sum) * totalPool)));
  }, [orderId, totalPool]);

  const [claimed, setClaimed] = React.useState({});
  const [opening, setOpening] = React.useState(null);
  const [showResult, setShowResult] = React.useState(null);
  const [stage, setStage] = React.useState("preview"); // preview → grabbed → leaderboard
  const [myReward, setMyReward] = React.useState(null);
  const [autoClaimers, setAutoClaimers] = React.useState([
    { name: t("আরিফ ভাই", "Arif"), avatar: "👨", amount: slotValues[1], slot: 1 },
    { name: t("সানজিদা", "Sanjida"), avatar: "👩", amount: slotValues[2], slot: 2 },
  ]);

  // Initialize: slot 0 already grabbed by self (preview)
  React.useEffect(() => {
    setClaimed({ 0: { name: t("আপনি", "You"), avatar: "🧑", amount: slotValues[0], self: true } });
    setMyReward(slotValues[0]);
    // Pre-claimed friends
    setClaimed(prev => ({
      ...prev,
      0: { name: t("আপনি", "You"), avatar: "🧑", amount: slotValues[0], self: true },
      1: { name: t("আরিফ ভাই", "Arif"), avatar: "👨", amount: slotValues[1] },
      2: { name: t("সানজিদা", "Sanjida"), avatar: "👩", amount: slotValues[2] },
    }));
  }, []);

  // Simulate someone grabbing every few seconds
  React.useEffect(() => {
    const fakeNames = [
      [t("রাহিম", "Rahim"), "👦"], [t("কামাল ভাই", "Kamal"), "🧔"],
      [t("নিলুফার", "Nilufar"), "👧"], [t("ফারিহা", "Fariha"), "👩‍🦰"],
      [t("জাহিদ", "Zahid"), "🧑"],
    ];
    let i = 0;
    const tick = setInterval(() => {
      const claimedSlots = Object.keys(claimed).map(Number);
      const open = [...Array(slots).keys()].filter(s => !claimedSlots.includes(s));
      if (open.length === 0) return;
      const slot = open[Math.floor(Math.random() * open.length)];
      const [name, avatar] = fakeNames[i++ % fakeNames.length];
      setClaimed(prev => ({ ...prev, [slot]: { name, avatar, amount: slotValues[slot] } }));
    }, 4500);
    return () => clearInterval(tick);
  }, [claimed]);

  const tapEnvelope = (i) => {
    if (claimed[i] || opening !== null) return;
    setOpening(i);
    setTimeout(() => {
      setClaimed(prev => ({ ...prev, [i]: { name: t("আপনি", "You"), avatar: "🧑", amount: slotValues[i], self: true } }));
      setShowResult(slotValues[i]);
      setOpening(null);
    }, 800);
  };

  const totalClaimed = Object.values(claimed).reduce((s, c) => s + c.amount, 0);
  const remaining = totalPool - totalClaimed;
  const claimedCount = Object.keys(claimed).length;

  // Sorted leaderboard
  const sortedClaims = Object.entries(claimed)
    .map(([slot, c]) => ({ slot: Number(slot), ...c }))
    .sort((a, b) => b.amount - a.amount);
  const topAmount = sortedClaims[0]?.amount;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: "linear-gradient(180deg,#8B0000 0%,#C62828 50%,#5D0000 100%)", overflow: "hidden", position: "relative" }}>
      {/* Decorative gold sparkles */}
      {[...Array(20)].map((_, i) => (
        <div key={i} style={{ position: "absolute", left: `${(i * 41) % 100}%`, top: `${(i * 71) % 100}%`, fontSize: 8 + (i % 3) * 4, color: "#FFD600", opacity: 0.3, animation: `sdSparkle ${2 + (i % 3)}s infinite`, animationDelay: `${i * 0.2}s` }}>✦</div>
      ))}

      {/* Header */}
      <div style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, position: "relative", zIndex: 5 }}>
        <div onClick={onBack} style={{ color: "#FFD600", fontSize: 22, cursor: "pointer" }}>←</div>
        <div style={{ color: "#FFD600", fontSize: 16, fontWeight: 800 }}>🧧 {t("লাল খাম", "Red Envelope")}</div>
        <div style={{ marginLeft: "auto" }}><LangToggle dark /></div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 100, position: "relative", zIndex: 5 }}>
        {/* Big envelope hero */}
        <div style={{ textAlign: "center", padding: "10px 16px 16px" }}>
          <div style={{ fontSize: 12, color: "#FFD600", fontWeight: 700, letterSpacing: 1 }}>{t("অর্ডার সম্পন্ন · বন্ধুদের শেয়ার করুন", "Order complete · Share with friends")}</div>
          <div style={{ marginTop: 6, fontSize: 22, fontWeight: 900, color: "#fff", lineHeight: 1.2, fontFamily: "'Hind Siliguri',serif" }}>
            {t("৳" + totalPool + " ছাড়ের লাল খাম", "৳" + totalPool + " in Red Envelopes")}
          </div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.75)", marginTop: 4 }}>
            {t(`অর্ডার ${orderId || "ORD-2026-001"} থেকে আনলক হয়েছে`, `Unlocked from order ${orderId || "ORD-2026-001"}`)}
          </div>

          {/* Pool meter */}
          <div style={{ marginTop: 14, background: "rgba(0,0,0,0.3)", borderRadius: 14, padding: 12, border: "1px solid rgba(255,215,0,0.4)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 10 }}>{t("পুল", "Pool")}</span>
              <span style={{ color: "#FFD600", fontSize: 18, fontWeight: 800 }}>৳{remaining} <span style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>/ ৳{totalPool}</span></span>
            </div>
            <div style={{ height: 6, background: "rgba(255,255,255,0.1)", borderRadius: 3, overflow: "hidden" }}>
              <div style={{ width: `${(remaining / totalPool) * 100}%`, height: "100%", background: "linear-gradient(90deg,#FFD600,#FFA000)", borderRadius: 3, transition: "width 0.5s" }} />
            </div>
            <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", fontSize: 10, color: "rgba(255,255,255,0.7)" }}>
              <span>{claimedCount}/{slots} {t("দাবি করা হয়েছে", "claimed")}</span>
              <span>{slots - claimedCount} {t("টি বাকি", "remaining")}</span>
            </div>
          </div>
        </div>

        {/* Envelope grid */}
        <div style={{ padding: "0 14px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
            {[...Array(slots)].map((_, i) => {
              const c = claimed[i];
              const isOpening = opening === i;
              return (
                <div key={i} onClick={() => tapEnvelope(i)} style={{
                  aspectRatio: "0.78",
                  background: c
                    ? (c.self ? "linear-gradient(135deg,#FFD600,#FFA000)" : "linear-gradient(135deg,#4A0000,#7B1010)")
                    : "linear-gradient(135deg,#D32F2F,#C62828)",
                  borderRadius: 10,
                  border: c?.self ? "2px solid #fff" : "2px solid rgba(255,215,0,0.5)",
                  position: "relative",
                  cursor: c ? "default" : "pointer",
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  justifyContent: "center",
                  boxShadow: c?.self ? "0 4px 16px rgba(255,215,0,0.5)" : "0 2px 6px rgba(0,0,0,0.3)",
                  transform: isOpening ? "scale(1.1) rotate(8deg)" : "scale(1)",
                  transition: "all 0.3s",
                  overflow: "hidden",
                }}>
                  {c ? (
                    <>
                      <SDAvatar name={c.name} size={28} style={{margin:"0 auto"}}/>
                      <div style={{ fontSize: 11, fontWeight: 800, color: c.self ? "#1A1A1A" : "#FFD600", marginTop: 2 }}>৳{c.amount}</div>
                      <div style={{ fontSize: 7, color: c.self ? "#5D0000" : "rgba(255,255,255,0.7)", marginTop: 1, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", padding: "0 4px" }}>{c.name}</div>
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize: 22 }}>🧧</div>
                      <div style={{ fontSize: 8, color: "#FFD600", fontWeight: 700, marginTop: 3, letterSpacing: 0.5 }}>{t("খুলুন", "TAP")}</div>
                    </>
                  )}
                  {/* gold seal */}
                  {!c && <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 14, height: 14, background: "#FFD600", borderRadius: "50%", border: "1.5px solid #B8860B", opacity: 0.85 }} />}
                </div>
              );
            })}
          </div>
        </div>

        {/* Leaderboard */}
        <div style={{ margin: "16px 12px 0", background: "rgba(255,255,255,0.97)", borderRadius: 16, overflow: "hidden" }}>
          <div style={{ padding: "12px 14px 8px", display: "flex", justifyContent: "space-between" }}>
            <div style={{ fontSize: 13, fontWeight: 800 }}>👑 {t("ভাগ্যবান তালিকা", "Lucky Leaderboard")}</div>
            <div style={{ fontSize: 10, color: SD_COLORS.muted }}>{t("লাইভ আপডেট", "live updates")}</div>
          </div>
          {sortedClaims.map((c, idx) => (
            <div key={c.slot} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderTop: "1px solid #F5F5F5", background: c.self ? "#FFFDE7" : "transparent" }}>
              <div style={{ width: 24, fontSize: 11, fontWeight: 800, color: idx === 0 ? "#F57F17" : SD_COLORS.muted, textAlign: "center" }}>
                {idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `#${idx + 1}`}
              </div>
              <SDAvatar name={c.name} size={32}/>
              <div style={{ flex: 1, fontSize: 12, fontWeight: 700 }}>
                {c.name}
                {c.self && <span style={{ marginLeft: 6, background: "#F57F17", color: "#fff", fontSize: 8, padding: "1px 5px", borderRadius: 4 }}>{t("আপনি", "YOU")}</span>}
                {c.amount === topAmount && <span style={{ marginLeft: 6, color: "#F57F17", fontSize: 9, fontWeight: 700 }}>👑 {t("সর্বাধিক", "highest")}</span>}
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: c.self ? "#F57F17" : SD_COLORS.primary }}>৳{c.amount}</div>
            </div>
          ))}
        </div>

        {/* My reward strip */}
        {myReward !== null && (
          <div style={{ margin: "10px 12px 0", background: "linear-gradient(135deg,#FFD600,#FFA000)", borderRadius: 14, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 32 }}>🎉</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "#5D0000", fontWeight: 700 }}>{t("আপনার পুরস্কার", "Your reward")}</div>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#1A1A1A", lineHeight: 1.1 }}>৳{myReward} {t("ছাড় কুপন", "off coupon")}</div>
              <div style={{ fontSize: 10, color: "#5D0000", marginTop: 2 }}>{t("পরবর্তী অর্ডারে স্বয়ংক্রিয় প্রযোজ্য · ৭ দিন বৈধ", "Auto-applied to next order · 7-day validity")}</div>
            </div>
          </div>
        )}

        <div style={{ textAlign: "center", padding: "14px 16px 4px", fontSize: 10, color: "rgba(255,255,255,0.6)", lineHeight: 1.5 }}>
          {t("নতুন বন্ধুরা ৳১০০ পর্যন্ত পাবেন · প্রতি অর্ডারে ১টি লাল খাম",
            "New friends get up to ৳100 · 1 red envelope per order")}
        </div>
      </div>

      {/* Sticky share CTA */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "linear-gradient(180deg,transparent,rgba(0,0,0,0.7))", padding: "10px 14px 24px", zIndex: 10 }}>
        <div onClick={() => fireToast({ icon: "🧧", title: t("WhatsApp-এ পাঠানো হয়েছে", "Sent to WhatsApp"), sub: t("বন্ধুরা ৳" + totalPool + " পর্যন্ত পাবে!", "Friends can win up to ৳" + totalPool + "!"), color: "#25D366" })}
          style={{ background: "linear-gradient(90deg,#25D366,#1EA952)", color: "#fff", borderRadius: 16, padding: "14px 0", textAlign: "center", fontSize: 14, fontWeight: 800, cursor: "pointer", boxShadow: "0 6px 20px rgba(37,211,102,0.5)" }}>
          💬 {t("WhatsApp-এ লাল খাম পাঠান", "Send Red Envelope on WhatsApp")} →
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 8 }}>
          {["📘", "📲", "📋"].map((ic, i) => (
            <div key={i} style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, cursor: "pointer", border: "1px solid rgba(255,215,0,0.3)" }}>{ic}</div>
          ))}
        </div>
      </div>

      {/* Result modal */}
      {showResult !== null && (
        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 24 }}>
          <div style={{ background: "linear-gradient(135deg,#C62828,#8B0000)", borderRadius: 22, padding: "28px 24px", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.6)", border: "3px solid #FFD600", maxWidth: 320 }}>
            <div style={{ fontSize: 56 }}>🧧</div>
            <div style={{ color: "#FFD600", fontSize: 14, fontWeight: 700, marginTop: 6 }}>{t("অভিনন্দন!", "Congratulations!")}</div>

            <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, marginTop: 8, lineHeight: 1.5 }}>{t("ছাড় কুপন আপনার অ্যাকাউন্টে যোগ হয়েছে", "Discount coupon added to your account")}</div>

<script type="text/babel" data-source="sd-tracking.jsx">
// ShareDeal — Order Tracking with rider live map
function TrackingScreen({ orderId, onBack, onNav, userOrders = [] }) {
  const lang = useLang();
  // Find matching order from session orders, then sample data, then fallback
  let order = userOrders.find(o => o.id === orderId);
  if (!order && orderId) {
    const sample = SD_DATA.orders.find(o => o.id === orderId);
    if (sample) {
      order = {
        id: sample.id,
        productName: sample.items?.[0],
        items: sample.items?.map(name => ({name})),
        total: sample.total,
        status: sample.status,
        statusBn: sample.statusBn,
        date: sample.date,
        mode: "solo",
      };
    }
  }
  // Final fallback: most recent session order, or hardcoded demo
  if (!order) order = userOrders[0] || null;
  const id = orderId || order?.id || "ORD-2026-042";
  const orderName = order?.productName || order?.name || (order?.items?.[0]?.name) || t("পোলাও চাল ৫কেজি","Polao Rice 5kg");
  const orderTotal = order?.total || 619;
  // Group buys not yet filled stay at "placed" stage; everything else progresses
  const isPendingGroup = order && (order.mode === "leader" || order.mode === "join");
  const [riderPos, setRiderPos] = React.useState(isPendingGroup ? 0 : 0.55);
  React.useEffect(() => {
    if (isPendingGroup) return; // no rider yet for unfilled group buys
    const i = setInterval(() => setRiderPos(p => Math.min(0.95, p + 0.005)), 800);
    return () => clearInterval(i);
  }, [isPendingGroup]);

  const stages = isPendingGroup ? [
    { id: "placed", icon: "📝", lbl: t("অর্ডার নেওয়া হয়েছে", "Order placed"), time: t("এখন","Now"), done: true },
    { id: "filling", icon: "👥", lbl: t("গ্রুপ পূরণ হচ্ছে", "Group filling"), time: t("চলমান","In progress"), done: true, active: true },
    { id: "packed", icon: "📦", lbl: t("গ্রুপ পূর্ণ হলে প্যাক হবে", "Pack after group fills"), time: "—", done: false },
    { id: "shipped", icon: "🚚", lbl: t("রাইডার নেবে", "Rider pickup"), time: "—", done: false },
    { id: "delivered", icon: "✅", lbl: t("ডেলিভারি", "Delivered"), time: "—", done: false },
  ] : (() => {
    // For non-group orders, derive stage progress from order.status
    const status = order?.status || "out";
    const isDelivered = status === "delivered";
    const isShipping = status === "shipping" || status === "out";
    const isProcessing = status === "processing";
    return [
      { id: "placed",   icon: "📝", lbl: t("অর্ডার নেওয়া হয়েছে",   "Order placed"),       time: "৯:১২",                              done: true },
      { id: "packed",   icon: "📦", lbl: t("প্যাক করা হয়েছে",     "Packed"),             time: isProcessing ? t("চলমান","In progress") : "১০:৩৪", done: !isProcessing,                       active: isProcessing },
      { id: "shipped",  icon: "🚚", lbl: t("রাইডার নিয়েছে",       "Rider picked up"),    time: isShipping || isDelivered ? "১১:২০" : "—",      done: isShipping || isDelivered },
      { id: "out",      icon: "🛵", lbl: t("ডেলিভারির পথে",       "Out for delivery"),  time: isShipping ? "১১:৪৭" : isDelivered ? "১১:৪৭" : "—", done: isShipping || isDelivered, active: isShipping && !isDelivered },
      { id: "delivered", icon: "✅", lbl: t("ডেলিভারি সম্পন্ন",      "Delivered"),         time: isDelivered ? "১২:৩৫" : t("আনুমানিক ১২:৩০", "ETA 12:30"), done: isDelivered, active: isDelivered },
    ];
  })();

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: SD_COLORS.bg, overflow: "hidden" }}>
      <TopBar title={`📍 ${t("অর্ডার ট্র্যাক", "Track Order")}`} onBack={onBack} rightEl={<LangToggle />} />

      {/* Map */}
      <div style={{ position: "relative", height: 240, background: "linear-gradient(180deg,#E3F2FD,#C8E6C9)", overflow: "hidden", borderBottom: "1px solid #DDD" }}>
        {/* Streets grid */}
        {[...Array(8)].map((_, i) => <div key={`h${i}`} style={{ position: "absolute", left: 0, right: 0, top: `${i * 14}%`, height: 1, background: "rgba(0,0,0,0.08)" }} />)}
        {[...Array(8)].map((_, i) => <div key={`v${i}`} style={{ position: "absolute", top: 0, bottom: 0, left: `${i * 14}%`, width: 1, background: "rgba(0,0,0,0.08)" }} />)}
        {/* Main road */}
        <svg width="100%" height="100%" style={{ position: "absolute", inset: 0 }}>
          <path d="M 30 200 Q 100 150, 180 130 T 340 80" stroke="#1976D2" strokeWidth="4" fill="none" strokeDasharray="6 4" />
          <path d="M 30 200 Q 100 150, 180 130 T 340 80" stroke="#42A5F5" strokeWidth="2" fill="none" strokeOpacity="0.5" />
        </svg>
        {/* Merchant pin */}
        <div style={{ position: "absolute", left: 22, bottom: 28, textAlign: "center" }}>
          <div style={{ fontSize: 26 }}>🏪</div>

        </div>

        <div style={{ position: "absolute", left: `${20 + riderPos * 70}%`, top: `${80 - riderPos * 50}%`, transform: "translate(-50%,-50%)", transition: "all 0.8s linear", zIndex: 10 }}>

<script type="text/babel" data-source="sd-polish.jsx">
// ShareDeal — Notifications, Q&A, Group Expiry Refund, Polish utilities

// ============ NOTIFICATIONS ============
function NotificationsScreen({ onBack, onNav, userOrders = [], userGroups = [] }) {
  const lang = useLang();
  const [filter, setFilter] = React.useState("all");

  // Synthesize real notifications from session orders + groups so the panel
  // reflects what the user has actually done. Newest first.
  const dynamicNotifs = [];
  // For each active group: leader → "share to fill", member → "X/Y joined"
  userGroups.forEach((g, idx) => {
    if (g.status === "active") {
      const need = g.total - g.joined;
      if (g.role === "leader") {
        dynamicNotifs.push({
          id: "g-" + g.id,
          type: "social",
          icon: "👑",
          title: t(`আপনার গ্রুপ পূরণ হচ্ছে · ${g.name}`, `Your group is filling · ${g.name}`),
          sub: need > 0
            ? t(`আর ${need} জন লাগবে · বন্ধুদের শেয়ার করুন`, `${need} more needed · share with friends`)
            : t("গ্রুপ পূর্ণ! অর্ডার সক্রিয়", "Group filled! Order active"),
          time: t("সম্প্রতি", "recent"),
          unread: idx < 2,
          route: "mygroups",
        });
      } else {
        const leaderName = g.leader || t("লিডার", "leader");
        dynamicNotifs.push({
          id: "g-" + g.id,
          type: "social",
          icon: "👥",
          title: t(`${leaderName.split(" ")[0]}-এর গ্রুপে আপনি`, `You're in ${leaderName.split(" ")[0]}'s group`),
          sub: need > 0
            ? t(`${g.joined}/${g.total} জন · আর ${need} জনের অপেক্ষায়`, `${g.joined}/${g.total} · waiting on ${need} more`)
            : t("গ্রুপ পূর্ণ! অর্ডার সক্রিয়", "Group filled! Order active"),
          time: t("সম্প্রতি", "recent"),
          unread: idx < 2,
          route: "mygroups",
        });
      }
    } else if (g.status === "expired") {
      dynamicNotifs.push({
        id: "ge-" + g.id,
        type: "system",
        icon: "⏱",
        title: t(`গ্রুপ মেয়াদোত্তীর্ণ · ${g.name}`, `Group expired · ${g.name}`),
        sub: t(`৳${g.groupPrice} ফেরত নিন + বোনাস`, `Get ৳${g.groupPrice} refund + bonus`),
        time: t("এইমাত্র", "just now"),
        unread: true,
        route: "groupexpiry",
      });
    }
  });
  // For each session order: status-specific notif
  userOrders.forEach((o, idx) => {
    if (o.status === "shipping" || o.status === "out") {
      dynamicNotifs.push({
        id: "o-" + o.id,
        type: "system",
        icon: "🚚",
        title: t(`আপনার অর্ডার ডেলিভারির পথে · ${o.id}`, `Order out for delivery · ${o.id}`),
        sub: t(`${o.productName} · ETA শীঘ্রই`, `${o.productName} · ETA soon`),
        time: t("সম্প্রতি", "recent"),
        unread: idx === 0,
        route: "tracking",
        orderId: o.id,
      });
    } else if (o.status === "delivered") {
      dynamicNotifs.push({
        id: "od-" + o.id,
        type: "system",
        icon: "✅",
        title: t(`অর্ডার পৌঁছে গেছে · ${o.id}`, `Order delivered · ${o.id}`),
        sub: t(`${o.productName} · রেট দিন`, `${o.productName} · please rate`),
        time: t("সম্প্রতি", "recent"),
        unread: false,
        route: "tracking",
        orderId: o.id,
      });
    } else if (o.mode === "leader" || o.mode === "join") {
      // Already covered by group notifs, skip
    } else {
      // Solo "processing"
      dynamicNotifs.push({
        id: "op-" + o.id,
        type: "system",
        icon: "📦",
        title: t(`অর্ডার নেওয়া হয়েছে · ${o.id}`, `Order placed · ${o.id}`),
        sub: t(`${o.productName} · ৳${o.total} · প্রস্তুত হচ্ছে`, `${o.productName} · ৳${o.total} · processing`),
        time: t("সম্প্রতি", "recent"),
        unread: idx === 0,
        route: "tracking",
        orderId: o.id,
      });
    }
  });

  // Static demo notifications — kept so first-time users see something useful.
  const staticNotifs = [
    { id: "s1", type: "deal", icon: "🔥", title: t("ফ্ল্যাশ সেল শুরু!", "Flash sale starting!"), sub: t("পোলাও চাল ৩৭% ছাড় · ২ ঘন্টা বাকি", "Polao Rice 37% off · 2h left"), time: t("৫ মিনিট আগে", "5 min ago"), unread: true, route: "flash" },
    { id: "s4", type: "deal", icon: "❤️", title: t("দাম কমেছে · উইশলিস্ট", "Price drop · wishlist"), sub: t("পোলাও চাল ৳৩০ কমেছে", "Polao Rice down ৳30"), time: t("২ ঘ", "2h"), unread: false, route: "wishlist" },
    { id: "s5", type: "social", icon: "🧧", title: t("সানজিদা লাল খাম পাঠিয়েছে", "Sanjida sent a red envelope"), sub: t("৳৩৫ ক্লেইম করুন · ২২ ঘ বাকি", "Claim ৳35 · 22h left"), time: t("৩ ঘ", "3h"), unread: false, route: "redenvelope" },
    { id: "s6", type: "system", icon: "🌳", title: t("আপনার গাছে পানি দরকার", "Your tree needs water"), sub: t("আজ পানি না দিলে স্ট্রিক ভাঙবে", "Streak breaks if you skip today"), time: t("৫ ঘ", "5h"), unread: false, route: "orchard" },
    { id: "s7", type: "deal", icon: "🎉", title: t("৳৫০ রেফারেল বোনাস!", "৳50 referral bonus!"), sub: t("কামাল আপনার কোড ব্যবহার করেছে", "Kamal used your code"), time: t("১ দিন", "1d"), unread: false, route: "profile" },
  ];
  const notifs = [...dynamicNotifs, ...staticNotifs];
  const filtered = filter === "all" ? notifs : notifs.filter(n => n.type === filter);
  const unread = notifs.filter(n => n.unread).length;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: SD_COLORS.bg, overflow: "hidden" }}>
      <TopBar title={`🔔 ${t("নোটিফিকেশন", "Notifications")} ${unread ? `(${unread})` : ""}`} onBack={onBack} rightEl={<LangToggle />} />
      <div style={{ background: "#fff", display: "flex", borderBottom: "1px solid #EEE", padding: "0 8px" }}>
        {[["all", t("সব", "All")], ["deal", t("ডিল", "Deals")], ["social", t("সামাজিক", "Social")], ["system", t("সিস্টেম", "System")]].map(([id, lbl]) => (
          <div key={id} onClick={() => setFilter(id)} style={{ flex: 1, textAlign: "center", padding: "11px 0", fontSize: 12, fontWeight: 700, color: filter === id ? SD_COLORS.primary : SD_COLORS.muted, borderBottom: filter === id ? `2px solid ${SD_COLORS.primary}` : "none", cursor: "pointer" }}>{lbl}</div>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 20 }}>
        {filtered.length === 0 ? (
          <EmptyState icon="🔔" title={t("কোনো নোটিফিকেশন নেই", "No notifications")} subtitle={t("আপনার সব নোটিফিকেশন এখানে দেখাবে", "All your notifications appear here")} />
        ) : filtered.map(n => (
          <div key={n.id} onClick={() => onNav(n.route, n.orderId ? {orderId: n.orderId} : undefined)} style={{ display: "flex", gap: 12, padding: "14px 16px", background: n.unread ? "#FFF8E1" : "#fff", borderBottom: "1px solid #F0F0F0", cursor: "pointer", position: "relative" }}>
            {n.unread && <div style={{ position: "absolute", left: 6, top: "50%", transform: "translateY(-50%)", width: 6, height: 6, borderRadius: "50%", background: SD_COLORS.red }} />}
            <div style={{ width: 42, height: 42, borderRadius: 12, background: n.type === "deal" ? "#FFEBEE" : n.type === "social" ? "#E8F5E9" : "#E3F2FD", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{n.icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1A1A1A" }}>{n.title}</div>
              <div style={{ fontSize: 11, color: SD_COLORS.muted, marginTop: 2, lineHeight: 1.4 }}>{n.sub}</div>
              <div style={{ fontSize: 10, color: SD_COLORS.muted, marginTop: 4 }}>{n.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

      timeLeft: 0, status: "completed",

      role: "leader",

              {g.status === "expired" && (
                <div onClick={()=>onNav("groupexpiry")} style={{background:"#FFEBEE",color:"#C62828",borderRadius:10,padding:"10px 12px",textAlign:"center",fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid #FFCDD2"}}>

                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ShareDeal — Subscriptions management dashboard
// Lists active and paused subscriptions, lets user pause/resume/skip-next/cancel,
// and change quantity. No pre-payment — each scheduled delivery becomes a
// separate COD order on its date.
function SubscriptionsScreen({ onBack, onNav, userSubscriptions = [], onPause, onResume, onCancel, onSkipNext, onChangeQty }) {
  const lang = useLang();
  const [tab, setTab] = React.useState("active");

  const visible = userSubscriptions.filter(s => s.status === tab);
  const cadenceLabel = (c) => ({
    daily: t("প্রতিদিন","Daily"),
    weekly: t("সাপ্তাহিক","Weekly"),
    biweekly: t("দুই সপ্তাহে","Bi-weekly"),
    monthly: t("মাসিক","Monthly"),
  }[c] || c);
  const cadenceShort = (c) => ({
    daily: t("দিন","day"),
    weekly: t("সপ্তাহ","wk"),
    biweekly: t("১৪ দিন","2wk"),
    monthly: t("মাস","mo"),
  }[c] || c);
  const fmtDate = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString(lang === "bn" ? "bn-BD" : "en-US", { day: "numeric", month: "short", year: "numeric" });
  };
  const daysUntil = (iso) => {
    if (!iso) return null;
    const ms = new Date(iso).getTime() - Date.now();
    const days = Math.ceil(ms / 86400000);
    if (days <= 0) return t("আজ","today");
    if (days === 1) return t("কাল","tomorrow");
    return t(`${days} দিনে`, `in ${days} days`);
  };

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",background:SD_COLORS.bg,minHeight:0}}>
      <TopBar title={`🔄 ${t("আমার সাবস্ক্রিপশন","My Subscriptions")}`} onBack={onBack} rightEl={<LangToggle/>}/>

      <div style={{background:"#fff",display:"flex",borderBottom:"1px solid #EEE",flexShrink:0}}>
        {[
          ["active",`✅ ${t("চালু","Active")} (${userSubscriptions.filter(s=>s.status==="active").length})`],
          ["paused",`⏸ ${t("বিরতিতে","Paused")} (${userSubscriptions.filter(s=>s.status==="paused").length})`],
        ].map(([id,lbl])=>(
          <div key={id} onClick={()=>setTab(id)} style={{flex:1,textAlign:"center",padding:"12px 0",fontSize:12,fontWeight:700,color:tab===id?SD_COLORS.primary:SD_COLORS.muted,borderBottom:tab===id?`2px solid ${SD_COLORS.primary}`:"none",cursor:"pointer"}}>{lbl}</div>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",minHeight:0,padding:"10px 12px 90px"}}>
        {visible.length === 0 ? (
          <div style={{padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔄</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>
              {tab === "active"
                ? t("কোনো সাবস্ক্রিপশন চালু নেই","No active subscriptions")
                : t("কোনো বিরতিতে নেই","No paused subscriptions")}
            </div>
            <div style={{fontSize:11,color:SD_COLORS.muted,marginTop:6,lineHeight:1.5}}>
              {t("নিয়মিত দরকারি পণ্য সাবস্ক্রাইব করে ১০-১৫% সেভ করুন · কোনো প্রি-পেমেন্ট লাগবে না","Subscribe to recurring essentials · save 10-15% · no pre-payment needed")}
            </div>
            <div onClick={()=>onNav && onNav("home")} style={{marginTop:18,display:"inline-block",background:SD_COLORS.primary,color:"#fff",borderRadius:12,padding:"10px 20px",fontSize:12,fontWeight:700,cursor:"pointer"}}>

          <div key={sub.id} style={{background:"#fff",borderRadius:12,padding:"14px",marginBottom:10,border:"1px solid #F0F0F0"}}>

// ShareDeal — Main App Router v2
function ShareDealApp() {
  // ── Persistence ──────────────────────────────────────────────────────
  // Hydrate from localStorage on first render so refreshing the page doesn't
  // wipe orders, groups, or onboarding state. Wrapped in try/catch because
  // some environments (private browsing, sandboxed iframes) throw on access.
  const loadPersisted = (key, fallback) => {
    try {
      if (typeof localStorage === "undefined") return fallback;
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch { return fallback; }
  };
  const savePersisted = (key, value) => {
    try {
      if (typeof localStorage === "undefined") return;
      localStorage.setItem(key, JSON.stringify(value));
    } catch {}
  };

  const [onboarded, setOnboarded] = React.useState(() => loadPersisted("sd_onboarded", false));
  const [screen, setScreen] = React.useState("home");
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [selectedProductType, setSelectedProductType] = React.useState("group");
  const [inviteProduct, setInviteProduct] = React.useState(null);
  const [selectedStream, setSelectedStream] = React.useState(null);
  const [selectedShop, setSelectedShop] = React.useState(null);
  const [bargainProduct, setBargainProduct] = React.useState(null);
  const [redEnvData, setRedEnvData] = React.useState({ orderId: "ORD-2026-042", total: 619 });
  const [landingKind, setLandingKind] = React.useState("bargain");
  const [cartContext, setCartContext] = React.useState(null); // { mode:"leader"|"join"|"solo", product, joinLeader? }
  const [history, setHistory] = React.useState(["home"]); // navigation back-stack
  const [cartCount, setCartCount] = React.useState(2);

  // Shared app state — orders and groups the current user has actually placed/joined
  // this session. Persists across screen navigation so the cart, MyGroups, profile
  // orders list, and tracking all read from the same source of truth.
  const [appOrders, setAppOrders] = React.useState(() => loadPersisted("sd_orders", []));
  const [appGroups, setAppGroups] = React.useState(() => loadPersisted("sd_groups", []));
  const [appSubscriptions, setAppSubscriptions] = React.useState(() => loadPersisted("sd_subscriptions", []));
  const [trackOrderId, setTrackOrderId] = React.useState(null);

  // Called from CartScreen when an order is confirmed. Single source of truth for
  // "what just happened": generates a real order id, persists everything, and
  // hands the success screen the right data.
  const placeOrder = (details) => {
    // details = { product, mode, joinLeader, items, total, paymentMethod, address }
    const now = new Date();
    const orderId = `ORD-2026-${String(100 + Math.floor(Math.random()*900)).padStart(3,"0")}`;
    const order = {
      id: orderId,
      productName: details.product?.name || (details.items?.[0]?.name) || t("অর্ডার","Order"),
      items: details.items || [],
      total: details.total,
      mode: details.mode,                   // solo | leader | join
      joinLeader: details.joinLeader || null,
      product: details.product || null,
      placedAt: now.toISOString(),
      status: "processing",
      statusBn: t("প্রস্তুত হচ্ছে","Processing"),
      paymentMethod: details.paymentMethod,
      address: details.address,
    };
    setAppOrders(prev => [order, ...prev]);

    // If this order starts or joins a group buy, also persist the group itself
    // so MyGroups can show it.
    if (details.mode === "leader" || details.mode === "join") {
      const p = details.product;
      const initialSeconds = p?.timeLeft || 3600 * 24;
      const newGroup = {
        id: `GRP-2026-${String(10 + Math.floor(Math.random()*90)).padStart(3,"0")}`,
        productId: p?.id, name: p?.name,
        role: details.mode === "leader" ? "leader" : "member",
        leader: details.mode === "leader" ? null : details.joinLeader,
        joined: details.mode === "leader" ? 1 : (p?.currentMembers || 0) + 1,
        total: p?.groupSize || 3,
        groupPrice: p?.groupPrice || details.total,
        soloPrice: p?.soloPrice || details.total,
        expiresAt: now.getTime() + initialSeconds * 1000,  // absolute expiry
        timeLeft: initialSeconds,                          // derived; recomputed on tick + hydration
        status: "active",

      };

    if (cadence === "daily") d.setDate(d.getDate() + 1);
    else if (cadence === "weekly") d.setDate(d.getDate() + 7);
    else if (cadence === "biweekly") d.setDate(d.getDate() + 14);
    else if (cadence === "monthly") d.setMonth(d.getMonth() + 1);

    const subId = `SUB-2026-${String(100 + Math.floor(Math.random()*900)).padStart(3,"0")}`;
    const sub = {
      id: subId,
      productId: details.product?.id,
      productName: details.product?.name || t("সাবস্ক্রিপশন","Subscription"),
      product: details.product,
      cadence: details.cadence,
      qty: details.qty || 1,
      basePrice: details.product?.soloPrice || details.product?.price || 0,
      subscribePrice: Math.round((details.product?.soloPrice || details.product?.price || 0) * 0.9), // 10% subscribe-and-save
      address: details.address || t("ধানমন্ডি, ঢাকা - ১২০৫","Dhanmondi, Dhaka - 1205"),
      paymentMethod: details.paymentMethod || "cod",
      status: "active",
      startedAt: new Date().toISOString(),
      nextDelivery: computeNextDelivery(details.cadence),
      deliveriesCompleted: 0,
      // Building bundle: mocked count of others-in-your-building who subscribed to
      // the same product. In production this would be a live count from the backend.
      buildingBundleCount: Math.floor(Math.random() * 4) + 1, // 1-4
    };
    setAppSubscriptions(prev => [sub, ...prev]);
    return sub;
  };

  const pauseSubscription = (id) => setAppSubscriptions(prev => prev.map(s => s.id === id ? {...s, status: "paused"} : s));
  const resumeSubscription = (id) => setAppSubscriptions(prev => prev.map(s => s.id === id ? {...s, status: "active", nextDelivery: computeNextDelivery(s.cadence)} : s));
  const cancelSubscription = (id) => setAppSubscriptions(prev => prev.filter(s => s.id !== id));
  const skipNextDelivery = (id) => setAppSubscriptions(prev => prev.map(s => s.id === id ? {...s, nextDelivery: computeNextDelivery(s.cadence, s.nextDelivery)} : s));
  const changeSubQty = (id, qty) => setAppSubscriptions(prev => prev.map(s => s.id === id ? {...s, qty: Math.max(1, qty)} : s));

  // On initial hydration from localStorage, recompute timeLeft from expiresAt
  // for any groups that have it. Groups created in older versions just keep
  // their stale timeLeft (graceful degradation).
  React.useEffect(() => {
    setAppGroups(prev => prev.map(g => {
      if (!g.expiresAt) return g;
      const now = Date.now();
      const newTimeLeft = Math.max(0, Math.floor((g.expiresAt - now) / 1000));
      const status = newTimeLeft === 0 && g.joined < g.total ? "expired" : g.status;
      return { ...g, timeLeft: newTimeLeft, status };
    }));
  }, []); // run once on mount

  useAutoToasts();

  // Persist orders immediately (rare changes)
  React.useEffect(() => savePersisted("sd_orders", appOrders), [appOrders]);
  React.useEffect(() => savePersisted("sd_onboarded", onboarded), [onboarded]);
  React.useEffect(() => savePersisted("sd_subscriptions", appSubscriptions), [appSubscriptions]);
  // Persist groups whenever their stable identity changes (ids, status, joined)
  // — but NOT on the per-second timeLeft tick. We derive a fingerprint that
  // ignores timeLeft so the save only fires when something meaningful happens.
  const groupsFingerprint = React.useMemo(
    () => JSON.stringify(appGroups.map(g => ({id:g.id, status:g.status, joined:g.joined, expiresAt:g.expiresAt}))),
    [appGroups]
  );
  React.useEffect(() => savePersisted("sd_groups", appGroups), [groupsFingerprint]);

  // Tick: each second decrement timeLeft on every active group and auto-expire
  // any whose timer hits zero. Real backend would do this server-side; locally

  // when there are no active groups so we don't generate spurious state updates.
  React.useEffect(() => {
    const i = setInterval(() => {
      setAppGroups(prev => {
        const hasActive = prev.some(g => g.status === "active" && g.timeLeft > 0);
        if (!hasActive) return prev; // referential equality → no re-render, no debounce reset
        return prev.map(g => {
          if (g.status !== "active") return g;
          const newTimeLeft = Math.max(0, (g.timeLeft || 0) - 1);
          if (newTimeLeft === 0 && g.joined < g.total) return { ...g, timeLeft: 0, status: "expired" };
          return { ...g, timeLeft: newTimeLeft };
        });
      });
    }, 1000);
    return () => clearInterval(i);
  }, []);

  const navigate = (s, payload) => {
    if (s === "redenvelope" && payload) setRedEnvData(payload);
    if (s === "landing" && payload) setLandingKind(payload);
    if (s === "cart") setCartContext(payload || null); // payload may be a context object; null = ordinary cart
    if (s === "invite" && payload) setInviteProduct(payload); // allow product hand-off via navigate

  };

    setSelectedProductType(type);
    _go("product");
  };

    setInviteProduct(product);
    _go("invite");
  };

    _go("livestream");

  const noBottomNav = ["product", "games", "invite", "cart", "livestream", "merchant", "shop", "groupcreate", "bargain", "redenvelope", "orchard", "tracking", "landing", "groupchat", "wishlist", "returns", "leader", "foryou", "livecheckout", "mygroups", "subscriptions", "qa", "groupexpiry", "notifications"];

  const renderScreen = () => {
    switch (screen) {
      case "home":     return <HomeScreen onNav={navigate} onProduct={openProduct} onInvite={openInvite} onStream={openStream} />;
      case "product":  return <ProductScreen productId={selectedProduct} type={selectedProductType} onBack={() => goBack("home")} onInvite={openInvite} onBargain={openBargain} onNav={navigate} userGroups={appGroups} userSubscriptions={appSubscriptions} onSubscribe={subscribe} />;
      case "explore":  return <ExploreScreen onNav={navigate} onProduct={openProduct} />;
      case "flash":    return <FlashScreen onNav={navigate} onProduct={openProduct} />;
      case "cart":     return <CartScreen onNav={navigate} onBack={() => goBack("home")} context={cartContext} onPlaceOrder={placeOrder} cartCount={cartCount} setCartCount={setCartCount} />;
      case "profile":  return <ProfileScreen onNav={navigate} onBack={() => goBack("home")} userOrders={appOrders} userGroups={appGroups} />;
      case "games":    return <GamesScreen onBack={() => goBack("profile")} onNav={navigate} />;
      case "invite":   return <InviteScreen product={inviteProduct} onBack={() => goBack("home")} onNav={navigate} />;
      case "livestream": return <LiveStreamScreen stream={selectedStream} onBack={() => goBack("home")} onNav={navigate} />;
      case "merchant": return <MerchantScreen onBack={() => goBack("profile")} onNav={navigate} />;
      case "shop":     return <ShopScreen shopName={selectedShop} onBack={() => goBack("product")} onNav={navigate} onProduct={openProduct} />;
      case "subscriptions": return <SubscriptionsScreen onBack={() => goBack("profile")} onNav={navigate} userSubscriptions={appSubscriptions} onPause={pauseSubscription} onResume={resumeSubscription} onCancel={cancelSubscription} onSkipNext={skipNextDelivery} onChangeQty={changeSubQty} />;;
      case "groupcreate": return <GroupCreateScreen onBack={() => goBack("merchant")} onNav={navigate} />;

    { id: "social", icon: "📡", label: "সামাজিক" },
    { id: "cart", icon: "🛒", label: "কার্ট", badge: cartCount },

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: SD_COLORS.bg, fontFamily: "'Hind Siliguri','Noto Sans Bengali',sans-serif", position: "relative", overflow: "hidden" }}>
      <ToastContainer />
      {renderScreen()}
      {!noBottomNav.includes(screen) && (
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid #EEE", display: "flex", zIndex: 100, paddingBottom: 20 }}>
          {tabs.map(t => (
            <div key={t.id} onClick={() => navigate(t.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 10, paddingBottom: 2, gap: 3, cursor: "pointer" }}>
              <div style={{ position: "relative" }}>
                <span style={{ fontSize: 22, filter: screen === t.id ? "none" : "grayscale(0.3) opacity(0.6)" }}>{t.icon}</span>
                {t.badge > 0 && <span style={{ position: "absolute", top: -4, right: -6, background: SD_COLORS.red, color: "#fff", borderRadius: 8, fontSize: 9, padding: "1px 4px", fontWeight: 700, minWidth: 14, textAlign: "center" }}>{t.badge}</span>}
              </div>
              <span style={{ fontSize: 10, fontWeight: 500, color: screen === t.id ? SD_COLORS.primary : SD_COLORS.muted }}>{t.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
