<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #111; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Hind Siliguri', sans-serif; }
  ::-webkit-scrollbar { display: none; }
  input, textarea { font-family: 'Hind Siliguri', sans-serif; }

  #stage { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }

  .phone-shell {
    width: 390px; height: 844px;
    border-radius: 52px;
    background: #1A1A1A;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8), inset 0 0 0 1.5px rgba(255,255,255,0.12);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 50px; background: #006A4E;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 8px; flex-shrink: 0; position: relative; z-index: 200;
    transition: background 0.3s;
  }
  .status-time { color: #fff; font-size: 14px; font-weight: 700; }
  .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; font-size: 12px; }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 126px; height: 34px; background: #1A1A1A;
    border-radius: 0 0 22px 22px; z-index: 300;
  }
  .screen-area {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    background: #F5F5F5; position: relative;
  }
  .home-indicator {
    height: 30px; background: #fff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .home-pill { width: 130px; height: 5px; background: #1A1A1A; border-radius: 3px; opacity: 0.2; }

  @media (max-height: 860px) { .phone-shell { transform: scale(0.9); transform-origin: center; } }
  @media (max-height: 780px) { .phone-shell { transform: scale(0.8); transform-origin: center; } }
  @media (max-height: 700px) { .phone-shell { transform: scale(0.72); transform-origin: center; } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

<script>
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const el = document.getElementById('status-time');
  if (el) el.textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);
</script>

<script type="text/babel" data-source="sd-lang.jsx">
// ShareDeal — Language System
window.LANG = window.LANG || 'bn';

// Low Data mode — disables image loading on scroll. Persists across sessions.
// Critical for users on 2G/3G networks outside Dhaka where every MB matters.
try {
  window.LOW_DATA = (typeof localStorage !== "undefined" && localStorage.getItem("sd_lowdata") === "true") || false;
} catch { window.LOW_DATA = false; }

window.t = function(bn, en) {
  return window.LANG === 'en' ? en : bn;
};

// Convert numerals in a string to Bengali when LANG is bn. Used for prices,
// counts, and times shown in UI to avoid the inconsistent "1/3" vs "১/৩" mix.
window.bn = function(s) {
  if (window.LANG === 'en' || s == null) return s;
  const map = { "0":"০","1":"১","2":"২","3":"৩","4":"৪","5":"৫","6":"৬","7":"৭","8":"৮","9":"৯" };
  return String(s).replace(/[0-9]/g, d => map[d]);
};

function useLang() {
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const handler = () => forceUpdate();
    window.addEventListener('langchange', handler);
    return () => window.removeEventListener('langchange', handler);
  }, []);
  return window.LANG;
}

function setLang(l) {
  window.LANG = l;
  window.dispatchEvent(new Event('langchange'));
}

function useLowData() {
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const handler = () => forceUpdate();
    window.addEventListener('lowdatachange', handler);
    return () => window.removeEventListener('lowdatachange', handler);
  }, []);
  return window.LOW_DATA;
}

function setLowData(on) {
  window.LOW_DATA = on;
  try { if (typeof localStorage !== "undefined") localStorage.setItem("sd_lowdata", String(on)); } catch {}
  window.dispatchEvent(new Event('lowdatachange'));
}

function LangToggle({ dark = false }) {
  const lang = useLang();
  return (
    <div onClick={() => setLang(lang === 'bn' ? 'en' : 'bn')} style={{
      display: "flex", alignItems: "center", gap: 2,
      background: dark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.08)",
      borderRadius: 20, padding: "3px 4px", cursor: "pointer",
      border: dark ? "1px solid rgba(255,255,255,0.25)" : "1px solid rgba(0,0,0,0.1)",
      userSelect: "none",
    }}>
      {["বাং","EN"].map(l => {
        const active = (l === "EN" && lang === "en") || (l === "বাং" && lang === "bn");
        return (
          <div key={l} style={{
            padding: "3px 8px", borderRadius: 16, fontSize: 10, fontWeight: 700,
            background: active ? (dark ? "#FFD600" : SD_COLORS.primary) : "transparent",
            color: active ? (dark ? "#1A1A1A" : "#fff") : (dark ? "rgba(255,255,255,0.6)" : SD_COLORS.muted),
            transition: "all 0.2s",
          }}>{l}</div>
        );
      })}
    </div>
  );
}

Object.assign(window, { useLang, setLang, LangToggle });

</script>
<script type="text/babel" data-source="sd-shared.jsx">
// ShareDeal — Shared Components
const SD_COLORS = {
  primary: "#006A4E",
  primaryLight: "#E8F5F0",
  primaryDark: "#004D38",
  red: "#E53935",
  redLight: "#FFF0F0",
  orange: "#FF6D00",
  orangeLight: "#FFF3E0",
  yellow: "#FFD600",
  bg: "#F5F5F5",
  white: "#FFFFFF",
  text: "#1A1A1A",
  muted: "#888",
  border: "#EEEEEE",
  card: "#FFFFFF",
};

const sdSharedStyles = {
  bottomNav: { position:"absolute",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #EEE",display:"flex",zIndex:100,paddingBottom:20 },
  navItem: { flex:1,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:10,paddingBottom:2,gap:3,cursor:"pointer",transition:"all 0.15s" },
  badge: { position:"absolute",top:-4,right:-6,background:SD_COLORS.red,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 4px",fontWeight:700,minWidth:14,textAlign:"center" },
  sectionHeader: { display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px 8px" },
  sectionTitle: { fontSize:16,fontWeight:700,color:"#1A1A1A" },
  seeAll: { fontSize:12,color:SD_COLORS.primary,fontWeight:600 },
  priceTag: { color:SD_COLORS.red,fontWeight:700 },
  originalPrice: { color:"#888",textDecoration:"line-through",fontSize:11 },
};

function BottomNav({ active, onNav, cartCount = 2 }) {
  const lang = useLang();
  const tabs = [
    { id:"home",   icon:"🏠", bn:"হোম",    en:"Home" },
    { id:"explore",icon:"🔍", bn:"খুঁজুন", en:"Search" },
    { id:"social", icon:"📡", bn:"সামাজিক",en:"Social" },
    { id:"cart",   icon:"🛒", bn:"কার্ট",  en:"Cart", badge:cartCount },
    { id:"profile",icon:"👤", bn:"আমার",   en:"Me" },
  ];
  return (
    <div style={sdSharedStyles.bottomNav}>
      {tabs.map(t => (
        <div key={t.id} style={sdSharedStyles.navItem} onClick={() => onNav(t.id)}>
          <div style={{ position:"relative" }}>
            <span style={{ fontSize:22, filter:active===t.id?"none":"grayscale(0.3) opacity(0.6)" }}>{t.icon}</span>
            {t.badge>0 && <span style={sdSharedStyles.badge}>{t.badge}</span>}
          </div>
          <span style={{ fontSize:10,fontWeight:500,color:active===t.id?SD_COLORS.primary:SD_COLORS.muted }}>{lang==="en"?t.en:t.bn}</span>
        </div>
      ))}
    </div>
  );
}

function CountdownTimer({ seconds }) {
  const lang = useLang();
  const [left, setLeft] = React.useState(seconds);
  React.useEffect(() => { setLeft(seconds); }, [seconds]); // resync if prop changes
  React.useEffect(() => { const i=setInterval(()=>setLeft(p=>Math.max(0,p-1)),1000); return ()=>clearInterval(i); },[]);
  const h=window.bn(String(Math.floor(left/3600)).padStart(2,"0"));
  const m=window.bn(String(Math.floor((left%3600)/60)).padStart(2,"0"));
  const s=window.bn(String(left%60).padStart(2,"0"));
  const box={background:"#1A1A1A",color:"#fff",borderRadius:4,padding:"1px 5px",fontSize:12,fontWeight:700,fontFamily:"monospace"};
  return <div style={{display:"flex",alignItems:"center",gap:2}}><span style={box}>{h}</span><span style={{fontSize:12,fontWeight:700}}>:</span><span style={box}>{m}</span><span style={{fontSize:12,fontWeight:700}}>:</span><span style={box}>{s}</span></div>;
}

function ProductPlaceholder({ w=80, h=80, name="", id=null, radius=8 }) {
  // Subscribe to low-data toggle so we re-render immediately when user flips it
  const lowData = (typeof useLowData === "function") ? useLowData() : (typeof window !== "undefined" ? window.LOW_DATA : false);
  if (!lowData && typeof window.SDImg === "function") {
    // Use the smart image component if available (loaded from sd-images.jsx)
    let resolvedId = id;
    if (!resolvedId && name && window.SD_DATA) {
      const all = [...(SD_DATA.groupDeals||[]), ...(SD_DATA.flashDeals||[]), ...(SD_DATA.exploreProducts||[]), ...(SD_DATA.liveStreams||[])];
      const match = all.find(p => p.name === name);
      if (match) resolvedId = match.id;
    }
    return <window.SDImg id={resolvedId} name={name} w={w} h={h} radius={radius} style={{border:"1px solid #EEE"}}/>;
  }
  // Lightweight placeholder — used as fallback and for low-data mode
  const colors=["#E8F5F0","#FFF0F0","#FFF3E0","#E8EAF6","#F3E5F5"];
  const c=colors[(name.charCodeAt(0)||0)%colors.length]||colors[0];
  return (
    <div style={{width:w,height:h,background:c,borderRadius:radius,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"1px solid #EEE",flexShrink:0}}>
      <span style={{fontSize:Math.min(typeof w==="number"?w:80,typeof h==="number"?h:80)*0.35}}>{lowData ? "📦" : "🛒"}</span>
      <span style={{fontSize:8,color:"#999",marginTop:2,textAlign:"center",padding:"0 4px",lineHeight:1.2}}>{name.slice(0,6)}</span>
    </div>
  );
}

function GroupProgress({ current, total }) {
  const pct=(current/total)*100;

  { keys: ["কসমেটিক", "cosmetic"], img: SD_IMAGES.l1 },
];

function sdResolveImage({ id, name }) {
  if (id && SD_IMAGES[id]) return SD_IMAGES[id];
  if (!name) return null;
  const lower = name.toLowerCase();
  for (const entry of SD_IMAGE_KEYWORDS) {
    if (entry.keys.some(k => lower.includes(k.toLowerCase()))) return entry.img;
  }
  return null;
}

// Smart Img: shows real photo if found, falls back to gradient + initial
function SDImg({ id, name = "", w = 80, h = 80, radius = 0, style = {} }) {
  const url = sdResolveImage({ id, name });
  const colors = ["#E8F5F0", "#FFF0F0", "#FFF3E0", "#E8EAF6", "#F3E5F5", "#E0F7FA", "#FFF8E1"];
  const accent = ["#006A4E", "#C62828", "#E65100", "#3949AB", "#7B1FA2", "#00838F", "#F57F17"];
  const i = (name.charCodeAt(0) || 0) % colors.length;
  const initial = (name.trim()[0] || "?").toUpperCase();
  const [errored, setErrored] = React.useState(false);
  const [loaded, setLoaded] = React.useState(false);

  const wrapStyle = { width: w, height: h, borderRadius: radius, position: "relative", overflow: "hidden", flexShrink: 0, background: `linear-gradient(135deg, ${colors[i]}, ${colors[(i + 2) % colors.length]})`, display: "flex", alignItems: "center", justifyContent: "center", ...style };

  if (!url || errored) {
    return (
      <div style={wrapStyle}>
        <span style={{ fontSize: Math.max(20, Math.min(56, (typeof h === "number" ? h : 100) * 0.4)), fontWeight: 800, color: accent[i], opacity: 0.7 }}>{initial}</span>
      </div>
    );
  }

  return (
    <div style={wrapStyle}>
      <img
        src={url}
        alt={name}
        loading="lazy"
        onLoad={() => setLoaded(true)}
        onError={() => setErrored(true)}
        style={{ width: "100%", height: "100%", objectFit: "cover", opacity: loaded ? 1 : 0, transition: "opacity 0.3s" }}
      />
      {!loaded && (
        <span style={{ position: "absolute", fontSize: Math.max(20, Math.min(56, (typeof h === "number" ? h : 100) * 0.4)), fontWeight: 800, color: accent[i], opacity: 0.4 }}>{initial}</span>
      )}
    </div>
  );
}

// Avatar: colored initials circle for people (livestreamers, friends, sellers, profile)
function SDAvatar({ name = "?", size = 40, style = {}, ring = false }) {
  // Stable color per name
  const palette = [
    ["#FCE4EC", "#C2185B"], ["#E8EAF6", "#3949AB"], ["#E0F7FA", "#00838F"],
    ["#FFF3E0", "#E65100"], ["#E8F5F0", "#006A4E"], ["#F3E5F5", "#7B1FA2"],
    ["#FFF8E1", "#F57F17"], ["#FFEBEE", "#C62828"], ["#E1F5FE", "#0277BD"],
  ];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  const [bg, fg] = palette[h % palette.length];
  const initials = name.trim().split(/\s+/).slice(0, 2).map(s => s[0] || "").join("").toUpperCase() || "?";
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bg, color: fg,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.4, fontWeight: 800, flexShrink: 0,
      border: ring ? `2px solid ${fg}` : "none",
      ...style
    }}>
      {initials}
    </div>
  );
}

Object.assign(window, { SD_IMAGES, sdResolveImage, SDImg, SDAvatar });

<script type="text/babel" data-source="sd-toast.jsx">
// ShareDeal — Toast / Notifications
const TOAST_EVENTS = [];
let toastListeners = [];
function fireToast(toast) {
  TOAST_EVENTS.push(toast);
  toastListeners.forEach(fn => fn(toast));
}
function useToastListener(fn) {
  React.useEffect(() => {
    toastListeners.push(fn);
    return () => { toastListeners = toastListeners.filter(f => f !== fn); };
  }, [fn]);
}

function ToastContainer() {
  const [toasts, setToasts] = React.useState([]);
  const addToast = React.useCallback((t2) => {
    const id = Date.now();
    setToasts(prev => [{ ...t2, id }, ...prev].slice(0, 4));
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 4000);
  }, []);
  useToastListener(addToast);

  return (
    <div style={{ position:"absolute", top:10, left:10, right:10, zIndex:9999, display:"flex", flexDirection:"column", gap:6, pointerEvents:"none" }}>
      {toasts.map((toast, i) => (
        <div key={toast.id} style={{
          background:"#1A1A1A", color:"#fff", borderRadius:14,
          padding:"10px 14px", display:"flex", alignItems:"center", gap:10,
          boxShadow:"0 4px 20px rgba(0,0,0,0.35)",
          animation:"toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1)",
          borderLeft:`4px solid ${toast.color||SD_COLORS.primary}`,
          opacity: i===0?1:0.85-i*0.15,
          transform:`scale(${1-i*0.03}) translateY(${i*2}px)`,
          transition:"all 0.2s",
        }}>
          <span style={{fontSize:20,flexShrink:0}}>{toast.icon||"🔔"}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,lineHeight:1.3}}>{toast.title}</div>
            {toast.sub&&<div style={{fontSize:10,color:"rgba(255,255,255,0.65)",marginTop:1}}>{toast.sub}</div>}
          </div>
          {toast.action&&<div style={{fontSize:10,color:toast.color||SD_COLORS.yellow,fontWeight:700,whiteSpace:"nowrap",cursor:"pointer",pointerEvents:"auto"}}>{toast.action}</div>}
        </div>
      ))}
      <style>{`@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}`}</style>
    </div>
  );
}

function useAutoToasts() {
  React.useEffect(() => {
    const events = [
      { delay:3000,  toast:{ icon:"👥", title:t("রাহিম মিরপুর থেকে গ্রুপে যোগ দিয়েছেন!","Rahim from Mirpur joined the group!"), sub:t("পোলাও চাল গ্রুপ — আর ১ জন দরকার","Polao Rice group — 1 more needed"), color:SD_COLORS.primary, action:t("দেখুন","View") }},

<script type="text/babel" data-source="sd-product.jsx">

  const seller = product.seller || t("ভেরিফায়েড সেলার","Verified Seller");
  const reviewsCount = product.reviews || Math.round((product.sold || 1000) * 0.18);

  // mode: "solo" | "group" — initialized from incoming type
  const [mode, setMode] = React.useState(type === "group" ? "group" : "solo");
  const [qty, setQty] = React.useState(1);
  const [tab, setTab] = React.useState("desc");
  const [pinned, setPinned] = React.useState(false);
  const [selectedGroupId, setSelectedGroupId] = React.useState(null);
  const [groupMemberFollowing, setGroupMemberFollowing] = React.useState([]);
  // Locality scope for group buys: building > lane > para > 2km. Building is the
  // strongest social signal in BD context (apartment buildings, joint family
  // compounds), so it's the default. Pinduoduo's edge in China was lane-level.
  const [scope, setScope] = React.useState("building");

  // Deterministic mock list of "open groups" anyone can join — locality-aware.

  // Lane = your gali (next building or two over).
  // Para = your neighborhood (~500m radius).
  // 2km = wider catchment, more deals but lower trust.
  const openGroups = React.useMemo(() => {
    const pools = {
      building: [
        { name: "রিনা আক্তার",     completed: 12, repeat: true,  joined: 2, locTag: t("৪র্থ তলা · ৪B","Floor 4 · Apt 4B") },
        { name: "করিম উদ্দিন",     completed: 4,  repeat: false, joined: 1, locTag: t("২য় তলা · ২A","Floor 2 · Apt 2A") },

      ],
      lane: [
        { name: "Fatima Rahman",   completed: 28, repeat: true,  joined: groupSize - 1, locTag: t("পাশের বিল্ডিং · ৮০ মি","Next building · 80m") },
        { name: "মো. আনিস",       completed: 2,  repeat: false, joined: 1, locTag: t("রোড ৫ · ১৫০ মি","Road 5 · 150m") },
        { name: "শাহিদা পারভীন",   completed: 9,  repeat: true,  joined: 2, locTag: t("কর্নার বাড়ি · ২২০ মি","Corner house · 220m") },

      ],
      "2km": [
        { name: "Rezaul Karim",    completed: 22, repeat: true,  joined: 2, locTag: t("কলাবাগান · ১.২ কিমি","Kalabagan · 1.2km") },
        { name: "জয়নাব আক্তার",   completed: 8,  repeat: true,  joined: 1, locTag: t("নিউ মার্কেট · ১.৫ কিমি","New Market · 1.5km") },

      ],

    for (let i = 0; i < (product.id||"").length; i++) seed = (seed * 31 + product.id.charCodeAt(i)) >>> 0;
    return pool.map((p, i) => ({
      id: `${scope}-og${i+1}`,
      leader: p.name,
      completed: p.completed,
      repeat: p.repeat,
      joined: Math.min(p.joined, groupSize - 1),

              ⚡ {t("এখনই কিনুন","Buy Now")} · ৳{soloPrice*qty}

}
Object.assign(window, { ProductScreen });

<script type="text/babel" data-source="sd-explore.jsx">
// ShareDeal — Explore Screen
function ExploreScreen({ onNav, onProduct }) {
  const lang = useLang();
  const [query, setQuery] = React.useState("");
  const [activeCategory, setActiveCategory] = React.useState("all");
  const [sort, setSort] = React.useState("popular");
  const { exploreProducts, categories } = SD_DATA;

  const cats = [{ id:"all", icon:"🏪", label:t("সব","All") }, ...categories.slice(0,6).map(c=>({...c,label:t(c.label,c.label)}))];
  const filtered = exploreProducts.filter(p =>
    (activeCategory==="all" || p.category===cats.find(c=>c.id===activeCategory)?.label) &&
    (!query || p.name.toLowerCase().includes(query.toLowerCase()))
  );
  const sorted = [...filtered].sort((a,b)=>sort==="popular"?b.sold-a.sold:sort==="price_asc"?(a.groupPrice||a.price)-(b.groupPrice||b.price):(b.groupPrice||b.price)-(a.groupPrice||a.price));
  const trending = [t("চাল","Rice"), t("ইলিশ","Hilsa Fish"), t("সরিষার তেল","Mustard Oil"), t("পেঁয়াজ","Onion"), t("দেশী ঘি","Desi Ghee")];

  return (
    <div style={{flex:1,overflowY:"auto",background:SD_COLORS.bg,paddingBottom:80}}>
      <div style={{background:SD_COLORS.primary,padding:"12px 16px 14px"}}>
        <div style={{background:"#fff",borderRadius:24,display:"flex",alignItems:"center",padding:"9px 14px",gap:8}}>
          <span style={{fontSize:16}}>🔍</span>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={t("পণ্য খুঁজুন...","Search products...")} style={{flex:1,border:"none",outline:"none",fontSize:14,fontFamily:"inherit",background:"transparent"}}/>
          {query && <span onClick={()=>setQuery("")} style={{fontSize:16,cursor:"pointer",color:SD_COLORS.muted}}>✕</span>}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><LangToggle dark/></div>
      </div>

      {!query && (
        <div style={{background:"#fff",padding:"10px 16px 12px"}}>
          <div style={{fontSize:12,fontWeight:700,color:SD_COLORS.muted,marginBottom:8}}>🔥 {t("ট্রেন্ডিং","Trending")}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {trending.map(t2=>(
              <div key={t2} onClick={()=>setQuery(t2)} style={{background:SD_COLORS.primaryLight,color:SD_COLORS.primary,borderRadius:16,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{t2}</div>
            ))}
          </div>
        </div>
      )}

      <div style={{background:"#fff",marginTop:2,display:"flex",overflowX:"auto",scrollbarWidth:"none",padding:"8px 12px",gap:6}}>
        {cats.map(c=>(
          <div key={c.id} onClick={()=>setActiveCategory(c.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:20,whiteSpace:"nowrap",cursor:"pointer",background:activeCategory===c.id?SD_COLORS.primary:SD_COLORS.bg,color:activeCategory===c.id?"#fff":SD_COLORS.text,fontSize:12,fontWeight:600,transition:"all 0.2s"}}>
            <span>{c.icon}</span><span>{c.label}</span>
          </div>
        ))}
      </div>

      <div style={{display:"flex",alignItems:"center",padding:"10px 16px",gap:8,background:"#fff",marginTop:2,borderBottom:"1px solid #EEE"}}>
        <span style={{fontSize:12,color:SD_COLORS.muted,marginRight:4}}>{t("সাজান:","Sort:")}</span>
        {[[" popular",t("জনপ্রিয়","Popular")],["price_asc",t("দাম ↑","Price ↑")],["price_desc",t("দাম ↓","Price ↓")]].map(([k,l])=>(
          <div key={k} onClick={()=>setSort(k.trim())} style={{padding:"4px 10px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",background:sort===k.trim()?SD_COLORS.primary:SD_COLORS.bg,color:sort===k.trim()?"#fff":SD_COLORS.text,transition:"all 0.2s"}}>{l}</div>
        ))}
        <div style={{marginLeft:"auto",fontSize:12,color:SD_COLORS.muted}}>{sorted.length} {t("পণ্য","items")}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px 16px"}}>
        {sorted.map(p=>{
          const solo = p.soloPrice || p.price;
          const group = p.groupPrice || Math.round(solo*0.8);
          const orig = p.originalPrice || Math.round(solo*1.4);
          const gSize = p.groupSize || 3;
          const gMembers = p.currentMembers || 0;
          return (
          <div key={p.id} onClick={()=>onProduct(p.id,"flash")} style={{background:"#fff",borderRadius:14,overflow:"hidden",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{position:"relative"}}>
              <ProductPlaceholder w="100%" h={120} name={p.name}/>
              <div style={{position:"absolute",top:6,left:6,background:SD_COLORS.red,color:"#fff",fontSize:9,fontWeight:700,borderRadius:6,padding:"2px 6px"}}>{Math.round((1-solo/orig)*100)}% {t("ছাড়","off")}</div>
              {gMembers>0 && <div style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.7)",color:"#FFD600",fontSize:9,fontWeight:800,borderRadius:6,padding:"2px 5px"}}>🔥 {gMembers}/{gSize}</div>}
            </div>
            <div style={{padding:"8px"}}>
              <div style={{fontSize:12,fontWeight:600,lineHeight:1.3,marginBottom:6,height:32,overflow:"hidden"}}>{p.name}</div>
              {/* Dual price tiles */}
              <div style={{display:"flex",gap:4}}>
                <div style={{flex:1,background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:6,padding:"3px 5px"}}>
                  <div style={{fontSize:8,fontWeight:700,color:"#8D6E00",lineHeight:1}}>{t("একা","Solo")}</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#8D6E00",lineHeight:1.1}}>৳{solo}</div>
                </div>
                <div style={{flex:1,background:SD_COLORS.primary,borderRadius:6,padding:"3px 5px"}}>
                  <div style={{fontSize:8,fontWeight:700,color:"#FFD600",lineHeight:1}}>👥 {gSize}{t("জন","")}</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#fff",lineHeight:1.1}}>৳{group}</div>
                </div>
              </div>
              <div style={{fontSize:10,color:SD_COLORS.muted,marginTop:4,textDecoration:"line-through"}}>৳{orig}</div>
              <div style={{fontSize:10,color:SD_COLORS.muted,marginTop:1}}>{p.sold.toLocaleString()} {t("বিক্রি","sold")}</div>
              <div style={{marginTop:6,background:SD_COLORS.primaryLight,color:SD_COLORS.primary,borderRadius:8,padding:"5px 0",textAlign:"center",fontSize:10,fontWeight:700}}>+ {t("গ্রুপে যোগ দিন","Join Group")}</div>
            </div>
          </div>
        );})}
      </div>
      {sorted.length===0 && (
        <div style={{padding:"40px 20px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🔍</div>
          <div style={{fontSize:15,fontWeight:700}}>{t("কোনো পণ্য পাওয়া যায়নি","No products found")}</div>
          <div style={{fontSize:12,color:SD_COLORS.muted,marginTop:4}}>{t("অন্য কীওয়ার্ড দিয়ে খোঁজার চেষ্টা করুন","Try a different keyword")}</div>
        </div>
      )}
    </div>
  );
}
Object.assign(window, { ExploreScreen });

</script>

<script type="text/babel" data-source="sd-cart.jsx">
// ShareDeal — Cart & Checkout
function CartScreen({ onNav, onBack, context, onPlaceOrder, cartCount, setCartCount }) {

        price,
        qty: 1,

        needed: p.groupSize || 3,
      }];
    }
    return SD_DATA.cartItems.map(i => ({...i}));
  }, [context]);

  const [items, setItems] = React.useState(initialItems);
  // If context changes while cart is open (rare but possible from rapid nav),
  // re-sync items so we don't show stale data.
  React.useEffect(() => { setItems(initialItems); }, [initialItems]);
  const [processing, setProcessing] = React.useState(false); // payment → success transition
  const [step, setStep] = React.useState("cart");
  const [payMethod, setPayMethod] = React.useState("cod"); // COD-first: ~90% of BD users prefer COD

  const subtotal = items.reduce((s,i)=>s+i.price*i.qty,0);
  const delivery = 50;

          {context && context.mode === "leader"

        <div style={{background:"#E8F5F0",border:"1px solid #B2DFDB",borderRadius:10,padding:"10px 12px",width:"100%",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8,textAlign:"left"}}>
          <span style={{fontSize:18}}>🛡️</span>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>{t("আপনার টাকা এখন এসক্রোতে","Your money is now in escrow")}</div>
            <div style={{fontSize:10,color:"#444",marginTop:1,lineHeight:1.4}}>

            </div>
          </div>
        </div>

        {/* bKash transaction-ID verification — solves the #1 social commerce trust friction in BD */}
        {placedOrder?.paymentMethod === "bkash" && (
          <div style={{background:bkashVerified?"#E8F5E9":"#FFF8E1",border:bkashVerified?"1px solid #A5D6A7":"1px solid #FFE082",borderRadius:10,padding:"10px 12px",width:"100%",marginBottom:14,textAlign:"left"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:18}}>📱</span>
              <div style={{flex:1,fontSize:11,fontWeight:700,color:bkashVerified?"#1B5E20":"#E65100"}}>
                {bkashVerified ? t("bKash যাচাই সফল","bKash verified") : t("bKash ট্রানজেকশন আইডি যাচাই করুন","Verify your bKash transaction ID")}

            {!bkashVerified ? (
              <>
                <div style={{fontSize:10,color:"#555",marginBottom:6,lineHeight:1.4}}>
                  {t("bKash অ্যাপ থেকে ট্রানজেকশন আইডি কপি করে এখানে দিন","Copy the transaction ID from the bKash app and paste it below")}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input value={bkashTxn} onChange={e=>setBkashTxn(e.target.value)} placeholder={t("যেমন: 9F4K2L8M","e.g. 9F4K2L8M")} style={{flex:1,border:"1.5px solid #DDD",borderRadius:8,padding:"7px 10px",fontSize:12,fontFamily:"inherit",outline:"none",boxSizing:"border-box",letterSpacing:0.5,textTransform:"uppercase"}}/>
                  <div onClick={()=>{
                      const cleaned = bkashTxn.replace(/\s/g,"").toUpperCase();
                      if (cleaned.length < 6) {
                        fireToast && fireToast({icon:"⚠️",title:t("ট্রানজেকশন আইডি ছোট","Transaction ID too short"),sub:t("৮-১২ অক্ষর দিন","Should be 8-12 chars")});

                      // Demo: simulate verification — real backend would query bKash API

                    {t("যাচাই","Verify")}
                  </div>
                </div>
              </>
            ) : (
              <div style={{fontSize:10,color:"#1B5E20",lineHeight:1.4}}>
                ✓ TXN <b style={{letterSpacing:0.5}}>{bkashTxn.toUpperCase()}</b> · {t("আপনার পেমেন্ট নিশ্চিত করা হয়েছে","Your payment is confirmed")}

          return (
            <div style={{background:`linear-gradient(135deg,${SD_COLORS.primary},#009688)`,borderRadius:18,padding:"16px",width:"100%",marginBottom:14,color:"#fff",textAlign:"left",position:"relative",overflow:"hidden",boxShadow:"0 8px 24px rgba(0,106,78,0.3)"}}>
              <div style={{position:"absolute",top:-8,right:-8,fontSize:64,opacity:0.18}}>👑</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <span style={{background:"#FFD600",color:"#1A1A1A",fontSize:9,fontWeight:800,padding:"3px 8px",borderRadius:6,letterSpacing:0.4}}>👑 {t("আপনি এখন গ্রুপ লিডার","YOU'RE THE GROUP LEADER")}</span>
              </div>
              <div style={{fontSize:15,fontWeight:800,lineHeight:1.3}}>
                {t(`আর ${need} জন বন্ধু চাই — গ্রুপ পূর্ণ হলে আপনার অর্ডার সক্রিয় হবে`,`${need} more friends needed — your order activates when the group fills`)}

              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>

              <div style={{fontSize:11,color:"rgba(255,255,255,0.85)",marginTop:6,lineHeight:1.4}}>

                📣 {t("বন্ধুদের শেয়ার করুন","Share with friends")} →
              </div>
            </div>

        {/* Joined-someone's-group confirmation */}
        {context && context.mode === "join" && context.product && (() => {
          const p = context.product;

          const filled = after >= (p.groupSize||3);

                    {filled
                      ? t("আপনার অর্ডার সক্রিয় — ডেলিভারি শুরু হবে","Your order is active — delivery starting soon")

        {/* Red Envelope unlock — the post-purchase loop */}
        <div onClick={()=>onNav("redenvelope",{orderId,total})} style={{background:"linear-gradient(135deg,#C62828,#8B0000)",borderRadius:18,padding:"16px",width:"100%",border:"2px solid #FFD600",cursor:"pointer",boxShadow:"0 8px 24px rgba(198,40,40,0.35)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-6,right:-6,fontSize:50,opacity:0.25}}>🧧</div>
          <div style={{display:"flex",alignItems:"center",gap:12,position:"relative"}}>
            <div style={{fontSize:38}}>🧧</div>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{color:"#FFD600",fontSize:11,fontWeight:700,letterSpacing:0.5}}>{t("আনলক হয়েছে","UNLOCKED")}</div>

  ];

            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:SD_COLORS.text,lineHeight:1.4}}>{t("এসক্রো সুরক্ষা · ৭ দিনের ফেরত গ্যারান্টি","Escrow protected · 7-day return guarantee")}</div>
              <div style={{fontSize:10,color:SD_COLORS.muted,marginTop:1}}>{t("পণ্য পাওয়ার আগে বিক্রেতা টাকা পাবে না","Seller paid only after you receive")}</div>
            </div>
          </div>

          {/* === Frequently bought with === */}
          {(() => {
            const cartIds = new Set(items.map(i=>i.id));
            const suggestions = [...SD_DATA.groupDeals, ...SD_DATA.exploreProducts]
              .filter(p => !cartIds.has(p.id))
              .slice(0, 4);
            if (suggestions.length === 0) return null;
            return (
              <div style={{background:"#fff",margin:"8px 0",padding:"14px 0 10px"}}>
                <div style={{fontSize:13,fontWeight:700,padding:"0 16px 10px",display:"flex",alignItems:"center",gap:6}}>
                  <span>🛍</span>
                  <span>{t("সাথে কিনতে পারেন","Frequently bought with")}</span>
                </div>
                <div style={{display:"flex",gap:10,padding:"0 16px",overflowX:"auto"}}>
                  {suggestions.map(p => {
                    const price = p.groupPrice || p.dealPrice || p.price || p.soloPrice;
                    const orig = p.originalPrice || p.soloPrice || Math.round(price*1.4);
                    return (
                      <div key={p.id} style={{flexShrink:0,width:120,background:"#FAFAFA",borderRadius:10,padding:8,border:"1px solid #F0F0F0"}}>
                        <ProductPlaceholder w={104} h={80} name={p.name} radius={8}/>
                        <div style={{fontSize:10,fontWeight:600,marginTop:6,lineHeight:1.3,height:26,overflow:"hidden"}}>{p.name}</div>
                        <div style={{display:"flex",alignItems:"baseline",gap:4,marginTop:3}}>
                          <span style={{fontSize:13,fontWeight:800,color:SD_COLORS.red}}>৳{price}</span>
                          {orig > price && <span style={{fontSize:9,color:SD_COLORS.muted,textDecoration:"line-through"}}>৳{orig}</span>}
                        </div>
                        <div onClick={()=>{
                          setItems(prev => [...prev, { id:p.id, name:p.name, price, qty:1, isGroup:!!p.groupPrice, members: p.currentMembers||0, needed: p.groupSize||3 }]);
                          fireToast({icon:"✅",title:t("কার্টে যোগ হয়েছে","Added to cart"),message:p.name});
                        }} style={{marginTop:6,background:SD_COLORS.primary,color:"#fff",borderRadius:8,padding:"5px 0",textAlign:"center",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ {t("যোগ করুন","Add")}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* === Coupon (collapsible) === */}
          <div style={{background:"#fff",margin:"8px 0",padding:"12px 16px"}}>
            {!coupon && !couponApplied && (
              <div onClick={()=>setCoupon(" ")} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                <span style={{fontSize:18}}>🎟</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700}}>{t("কুপন কোড আছে?","Have a coupon?")}</div>
                  <div style={{fontSize:11,color:SD_COLORS.muted,marginTop:1}}>{t("RAFI240 দিয়ে ৳৩০ ছাড় পান","Try RAFI240 for ৳30 off")}</div>
                </div>
                <span style={{fontSize:18,color:SD_COLORS.primary}}>＋</span>
              </div>
            )}
            {(coupon || couponApplied) && (
              <>
                <div style={{fontSize:13,fontWeight:700,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span>🎟</span><span>{t("কুপন কোড","Coupon Code")}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input value={coupon.trim()} onChange={e=>setCoupon(e.target.value)} placeholder={t("কুপন কোড লিখুন","Enter coupon code")} style={{flex:1,border:`1.5px solid ${couponApplied?SD_COLORS.primary:"#DDD"}`,borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:"inherit",outline:"none",background:couponApplied?SD_COLORS.primaryLight:"#fff"}}/>
                  <div onClick={()=>{
                    if (coupon.trim().toUpperCase() === "RAFI240") { setCouponApplied(true); fireToast({icon:"✅",title:t("কুপন প্রয়োগ হয়েছে","Coupon applied"),message:t("৳৩০ ছাড় পেয়েছেন","৳30 discount")}); }
                    else { fireToast({icon:"⚠️",title:t("ভুল কোড","Invalid code"),message:t("RAFI240 চেষ্টা করুন","Try RAFI240")}); }
                  }} style={{background:couponApplied?"#FAFAFA":SD_COLORS.primary,color:couponApplied?SD_COLORS.muted:"#fff",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:couponApplied?"default":"pointer",whiteSpace:"nowrap",border:couponApplied?"1px solid #DDD":"none"}}>{couponApplied?`✓ ${t("প্রয়োগ হয়েছে","Applied")}`:t("প্রয়োগ করুন","Apply")}</div>
                </div>
              </>
            )}
          </div>

          {/* === Price summary === */}
          {(() => {
            const allProds = [...SD_DATA.groupDeals, ...SD_DATA.flashDeals, ...SD_DATA.exploreProducts];
            let totalSaved = 0;
            items.forEach(it => {
              const src = allProds.find(p => p.id === it.id);
              const orig = src?.originalPrice || src?.soloPrice || Math.round(it.price * 1.4);
              totalSaved += Math.max(0, (orig - it.price) * it.qty);
            });
            const rows = [
              [t("পণ্যের মূল্য","Subtotal"),`৳${subtotal}`,SD_COLORS.text],
              totalSaved > 0 ? [t("ডিল সাশ্রয়","Deal savings"),`−৳${totalSaved}`,SD_COLORS.primary] : null,
              couponApplied ? [t("কুপন ছাড়","Coupon discount"),`−৳${discount}`,SD_COLORS.primary] : null,
              [t("ডেলিভারি চার্জ","Delivery"),`৳${delivery}`,SD_COLORS.text],
            ].filter(Boolean);
            return (
              <div style={{background:"#fff",margin:"8px 0",padding:"14px 16px"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:SD_COLORS.muted,letterSpacing:0.3}}>{t("মূল্য বিবরণ","PRICE SUMMARY")}</div>
                {rows.map(([l,v,c])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                    <span style={{color:SD_COLORS.muted}}>{l}</span>
                    <span style={{fontWeight:600,color:c}}>{v}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px dashed #DDD",paddingTop:12,marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{fontSize:14,fontWeight:700}}>{t("মোট পরিশোধ","Total payable")}</span>
                  <span style={{fontSize:22,fontWeight:900,color:SD_COLORS.text}}>৳{total}</span>
                </div>
              </div>
            );
          })()}
        </>}

        {step==="address" && (
          <div style={{background:"#fff",margin:"8px 0",padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{t("ডেলিভারি ঠিকানা","Delivery Address")}</div>
            {addresses.filter(a=>!a.includes("➕")).map(a=>(
              <div key={a} onClick={()=>setAddress(a)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:`1.5px solid ${address===a?SD_COLORS.primary:"#EEE"}`,marginBottom:8,cursor:"pointer",background:address===a?SD_COLORS.primaryLight:"#fff"}}>
                <span style={{fontSize:20}}>📍</span>
                <span style={{fontSize:13,fontWeight:address===a?700:400}}>{a}</span>
                {address===a && <span style={{marginLeft:"auto",color:SD_COLORS.primary}}>✓</span>}
              </div>
            ))}
            {!addingAddress ? (
              <div onClick={()=>setAddingAddress(true)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:`1.5px dashed ${SD_COLORS.primary}`,marginBottom:8,cursor:"pointer",color:SD_COLORS.primary,fontWeight:700}}>
                <span style={{fontSize:20}}>➕</span>
                <span style={{fontSize:13}}>{t("নতুন ঠিকানা যোগ করুন","Add new address")}</span>
              </div>
            ) : (
              <div style={{padding:"12px",borderRadius:12,border:`1.5px solid ${SD_COLORS.primary}`,background:SD_COLORS.primaryLight,marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:SD_COLORS.primary,marginBottom:8}}>📍 {t("নতুন ঠিকানা","New address")}</div>
                <input value={newAddress} onChange={e=>setNewAddress(e.target.value)} placeholder={t("যেমন: পল্লবী, ঢাকা - ১২১৬","e.g. Pallabi, Dhaka - 1216")} style={{width:"100%",border:"1.5px solid #DDD",borderRadius:10,padding:"10px 12px",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <div onClick={()=>{setAddingAddress(false);setNewAddress("");}} style={{flex:1,background:"#fff",border:"1px solid #DDD",borderRadius:10,padding:"8px 0",textAlign:"center",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t("বাতিল","Cancel")}</div>
                  <div onClick={()=>{ if(newAddress.trim()) { setExtraAddresses(prev=>[...prev, newAddress.trim()]); setAddress(newAddress.trim()); setAddingAddress(false); setNewAddress(""); fireToast && fireToast({icon:"✅",title:t("ঠিকানা যোগ হয়েছে","Address added"),sub:newAddress.trim()}); } }} style={{flex:1,background:newAddress.trim()?SD_COLORS.primary:"#CCC",color:"#fff",borderRadius:10,padding:"8px 0",textAlign:"center",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t("সংরক্ষণ","Save")}</div>
                </div>
              </div>
            )}
          </div>
        )}

        {step==="payment" && (
          <div style={{background:"#fff",margin:"8px 0",padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{t("পেমেন্ট পদ্ধতি","Payment Method")}</div>
            {[
              ["cod","💵",t("ক্যাশ অন ডেলিভারি","Cash on Delivery"),t("পণ্য পেয়ে পরিশোধ · নিরাপদ","Pay on receipt · safest"),true],
              ["bkash","📱","bKash","01XXXXXXXXX",false],
              ["nagad","🟠","Nagad","01XXXXXXXXX",false],
              ["card","💳",t("কার্ড পেমেন্ট","Card Payment"),"Visa / Mastercard",false],
            ].map(([id,icon,name,sub,popular])=>(
              <div key={id} onClick={()=>setPayMethod(id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px",borderRadius:12,border:`1.5px solid ${payMethod===id?SD_COLORS.primary:"#EEE"}`,marginBottom:8,cursor:"pointer",background:payMethod===id?SD_COLORS.primaryLight:"#fff",position:"relative"}}>
                <span style={{fontSize:22}}>{icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    {name}
                    {popular && <span style={{background:SD_COLORS.orange,color:"#fff",fontSize:8,fontWeight:800,padding:"1px 6px",borderRadius:4,letterSpacing:0.3}}>🔥 {t("জনপ্রিয়","POPULAR")}</span>}
                  </div>
                  <div style={{fontSize:11,color:SD_COLORS.muted,marginTop:1}}>{sub}</div>
                </div>
                {payMethod===id&&<span style={{color:SD_COLORS.primary,fontSize:18,flexShrink:0}}>✓</span>}
              </div>
            ))}

            {/* COD-only: confirmation call toggle */}
            {payMethod === "cod" && (
              <div onClick={()=>setCodConfirmCall(c=>!c)} style={{marginTop:6,marginBottom:10,padding:"12px 14px",borderRadius:12,background:codConfirmCall?"#FFF8E1":SD_COLORS.bg,border:codConfirmCall?"1px solid #FFE082":"1px solid #EEE",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>📞</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700}}>{t("ডেলিভারির আগে কনফার্মেশন কল","Confirmation call before delivery")}</div>
                  <div style={{fontSize:10,color:SD_COLORS.muted,marginTop:1,lineHeight:1.4}}>{t("রাইডার আপনাকে কল করে নিশ্চিত করবে","Rider will call to confirm before arriving")}</div>
                </div>
                <div style={{ width: 36, height: 20, background: codConfirmCall ? SD_COLORS.primary : "#CCC", borderRadius: 10, position: "relative", transition:"background 0.2s",flexShrink:0 }}>
                  <div style={{ position: "absolute", left: codConfirmCall ? 18 : 2, top: 2, width: 16, height: 16, background: "#fff", borderRadius: "50%", transition:"left 0.2s" }} />
                </div>
              </div>
            )}

            <div style={{background:SD_COLORS.primaryLight,borderRadius:12,padding:"12px 14px",marginTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:800}}>
                <span>{t("মোট পরিশোধ","Total Payable")}</span><span style={{color:SD_COLORS.red}}>৳{total}</span>
              </div>
              {payMethod === "cod" && (
                <div style={{fontSize:10,color:"#1B5E20",marginTop:6,lineHeight:1.4}}>
                  💵 {t("পণ্য পাওয়ার সময় রাইডারকে দিন","Hand cash to the rider when you receive the product")}
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"12px 16px 28px",background:"#fff",borderTop:"1px solid #EEE",boxShadow:"0 -2px 12px rgba(0,0,0,0.04)"}}>
        {step === "cart" && (() => {
          const allProds = [...SD_DATA.groupDeals, ...SD_DATA.flashDeals, ...SD_DATA.exploreProducts];
          let totalSaved = 0;
          items.forEach(it => {
            const src = allProds.find(p => p.id === it.id);
            const orig = src?.originalPrice || src?.soloPrice || Math.round(it.price * 1.4);
            totalSaved += Math.max(0, (orig - it.price) * it.qty);
          });
          if (couponApplied) totalSaved += discount;
          return (
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{flexShrink:0}}>
                <div style={{fontSize:10,color:SD_COLORS.muted,fontWeight:600,lineHeight:1}}>{t("মোট","Total")}</div>
                <div style={{fontSize:20,fontWeight:900,color:SD_COLORS.text,lineHeight:1.2}}>৳{total}</div>
                {totalSaved > 0 && <div style={{fontSize:9,color:SD_COLORS.primary,fontWeight:700,lineHeight:1}}>{t(`৳${totalSaved} বাঁচালেন 🎉`,`Saved ৳${totalSaved} 🎉`)}</div>}
              </div>
              <div onClick={()=>{ if (!processing) setStep("address"); }} style={{flex:1,background:processing?"#999":SD_COLORS.primary,color:"#fff",borderRadius:14,padding:"14px 0",textAlign:"center",fontSize:14,fontWeight:700,cursor:processing?"wait":"pointer"}}>
                {t("পরবর্তী ধাপ →","Next Step →")}
              </div>
            </div>
          );
        })()}
        {step !== "cart" && (
          <div onClick={()=>{
              if (processing) return;
              if (step === "address") { setStep("payment"); return; }
              // step === "payment" → confirm order
              setProcessing(true);
              setTimeout(() => {
                if (onPlaceOrder) {
                  const order = onPlaceOrder({
                    product: context?.product || null,
                    mode: context?.mode || "solo",
                    joinLeader: context?.joinLeader || null,
                    items: items.map(i => ({...i})),
                    total,
                    paymentMethod: payMethod,
                    codConfirmCall: payMethod === "cod" ? codConfirmCall : null,
                    address,
                  });
                  setPlacedOrder(order);
                  if (!context?.product && setCartCount) setCartCount(0);
                }
                setProcessing(false);
                setStep("success");
              }, 700);
            }} style={{background:processing?"#999":SD_COLORS.primary,color:"#fff",borderRadius:14,padding:"14px 0",textAlign:"center",fontSize:15,fontWeight:700,cursor:processing?"wait":"pointer",transition:"background 0.2s"}}>
            {processing
              ? <span style={{display:"inline-flex",alignItems:"center",gap:8}}><span style={{display:"inline-block",width:14,height:14,border:"2.5px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"sdSpin 0.7s linear infinite"}}/>{t("পেমেন্ট প্রসেসিং...","Processing payment...")}</span>
              : step==="address"?t("পেমেন্ট পদ্ধতি বেছে নিন","Choose Payment"):t("অর্ডার নিশ্চিত করুন ✅","Confirm Order ✅")}
          </div>
        )}
      </div>
      <style>{`@keyframes sdSpin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}
Object.assign(window, { CartScreen });

</script>
<script type="text/babel" data-source="sd-profile.jsx">

      : (o.date || t("আজ","Today")),

  }));

  return (
    <div style={{flex:1,overflowY:"auto",background:SD_COLORS.bg,paddingBottom:80}}>
      <div style={{background:`linear-gradient(135deg,${SD_COLORS.primary},${SD_COLORS.primaryDark})`,padding:"20px 16px 28px"}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}><LangToggle dark/></div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <SDAvatar name={user.name} size={64} style={{border:"2.5px solid rgba(255,255,255,0.6)"}}/>
          <div>
            <div style={{color:"#fff",fontSize:18,fontWeight:800}}>{user.name}</div>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:12,marginTop:2}}>{user.phone}</div>
            <div style={{marginTop:5,background:"rgba(255,215,0,0.25)",color:"#FFD600",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700,display:"inline-block"}}>🏅 {user.level}</div>
          </div>
          <div onClick={()=>fireToast && fireToast({icon:"✏️",title:t("শীঘ্রই আসছে","Coming soon"),sub:t("প্রোফাইল সম্পাদনা","Edit profile")})} style={{marginLeft:"auto",color:"rgba(255,255,255,0.8)",fontSize:20,cursor:"pointer"}}>✏️</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          {[["🪙",user.coins,t("কয়েন","Coins")],["👥",user.referrals,t("রেফারেল","Referrals")],["💰",`৳${user.savings}`,t("সাশ্রয়","Savings")]].map(([icon,val,label])=>(
            <div key={label} style={{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:16}}>{icon}</div>
              <div style={{color:"#fff",fontSize:15,fontWeight:800,marginTop:2}}>{val}</div>
              <div style={{color:"rgba(255,255,255,0.7)",fontSize:9,marginTop:1}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:"#fff",margin:"8px 0",padding:"12px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:8}}>

<script type="text/babel" data-source="sd-bargain.jsx">
// ShareDeal — Bargain-for-Free (কাটাকাটি / Kanjia)
// Core viral loop: pick a product, friends tap to "cut" the price toward ৳0
function BargainScreen({ bargainProduct, onBack, onNav }) {
  const lang = useLang();
  // Default to a hero product if none passed in
  const p = bargainProduct || { ...SD_DATA.groupDeals[0], originalPrice: SD_DATA.groupDeals[0].soloPrice };
  const original = p.originalPrice || p.soloPrice || p.dealPrice * 2 || 480;

  // Bargain state — persisted in window so it survives screen swaps in the prototype
  const stateKey = `bargain-${p.id}`;
  const initial = window.__sdBargain && window.__sdBargain[stateKey];
  const [cutAmount, setCutAmount] = React.useState(initial?.cutAmount ?? Math.round(original * 0.55));
  const [helpers, setHelpers] = React.useState(initial?.helpers ?? [
    { name: t("আপনি (শুরু)", "You (started)"), avatar: "🧑", amount: Math.round(original * 0.45), self: true, time: t("এখন", "now") },
    { name: t("আরিফ ভাই", "Arif"), avatar: "👨", amount: 28, time: t("৫ মিনিট আগে", "5 min ago") },
    { name: t("সানজিদা", "Sanjida"), avatar: "👩", amount: 41, time: t("৮ মিনিট আগে", "8 min ago") },
    { name: t("রাহিম", "Rahim"), avatar: "👦", amount: 22, time: t("১২ মিনিট আগে", "12 min ago") },
  ]);
  const [tapping, setTapping] = React.useState(false);
  const [lastCut, setLastCut] = React.useState(null);
  const [showFreeModal, setShowFreeModal] = React.useState(false);
  const [timeLeft, setTimeLeft] = React.useState(initial?.timeLeft ?? 23 * 3600 + 14 * 60);

  React.useEffect(() => {
    const id = setInterval(() => setTimeLeft(s => Math.max(0, s - 1)), 1000);
    return () => clearInterval(id);
  }, []);

  React.useEffect(() => {
    window.__sdBargain = window.__sdBargain || {};
    window.__sdBargain[stateKey] = { cutAmount, helpers, timeLeft };
  }, [cutAmount, helpers, timeLeft]);

  const remaining = Math.max(0, original - cutAmount);
  const pct = Math.min(100, (cutAmount / original) * 100);
  const isFree = remaining === 0;

  const friendsHelped = helpers.length - 1; // exclude self
  const friendsNeeded = Math.max(0, 8 - friendsHelped);

  // "Help cut" simulates a friend tapping
  const simulateHelp = () => {
    if (isFree || tapping) return;
    setTapping(true);
    const newCut = remaining < 30 ? remaining : Math.floor(8 + Math.random() * 35);
    const fakeNames = [
      [t("কামাল ভাই", "Kamal"), "🧔"],
      [t("নিলুফার", "Nilufar"), "👧"],
      [t("রাশেদ", "Rashed"), "👨‍🦱"],
      [t("ফারিহা", "Fariha"), "👩‍🦰"],
      [t("জাহিদ", "Zahid"), "🧑"],
      [t("মিতু আপু", "Mitu"), "👩"],
    ];
    const [name, avatar] = fakeNames[Math.floor(Math.random() * fakeNames.length)];

    setLastCut(newCut);
    setTimeout(() => {
      setCutAmount(c => c + newCut);
      setHelpers(prev => [{ name, avatar, amount: newCut, time: t("এইমাত্র", "just now") }, ...prev]);
      setTapping(false);
      if (cutAmount + newCut >= original) {
        setTimeout(() => setShowFreeModal(true), 600);
      }
      setTimeout(() => setLastCut(null), 1800);
    }, 700);
  };

  const shareChannels = [
    { icon: "💬", label: "WhatsApp", color: "#25D366", primary: true },
    { icon: "📘", label: "Facebook", color: "#1877F2" },
    { icon: "📲", label: "SMS", color: SD_COLORS.primary },
    { icon: "📋", label: t("কপি", "Copy"), color: SD_COLORS.orange },
  ];

  const fmtTime = s => {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: "#FFF8E7", overflow: "hidden" }}>
      {/* Header — festive red/gold like a Pohela Boishakh card */}
      <div style={{ background: "linear-gradient(180deg,#C62828 0%,#D32F2F 60%,#E53935 100%)", padding: "10px 14px 18px", position: "relative", overflow: "hidden" }}>
        {/* sparkle dots */}
        {[...Array(14)].map((_, i) => (
          <div key={i} style={{ position: "absolute", left: `${(i * 37) % 100}%`, top: `${(i * 53) % 90}%`, width: 4, height: 4, background: "#FFD600", borderRadius: "50%", opacity: 0.4 }} />
        ))}
        <div style={{ display: "flex", alignItems: "center", gap: 10, position: "relative", zIndex: 2 }}>
          <div onClick={onBack} style={{ color: "#fff", fontSize: 20, cursor: "pointer" }}>←</div>
          <div style={{ color: "#fff", fontSize: 16, fontWeight: 800 }}>✂️ {t("কাটাকাটি — ফ্রি জিতুন", "Bargain — Win it Free")}</div>
          <div style={{ marginLeft: "auto" }}><LangToggle dark /></div>
        </div>

        {/* Hero card */}
        <div style={{ marginTop: 14, background: "#fff", borderRadius: 18, padding: 14, boxShadow: "0 6px 24px rgba(0,0,0,0.25)", border: "2px solid #FFD600", position: "relative", zIndex: 2 }}>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <ProductPlaceholder w={68} h={68} name={p.name} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.3 }}>{p.name}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                <span style={{ fontSize: 11, color: SD_COLORS.muted, textDecoration: "line-through" }}>৳{original}</span>
                <span style={{ background: "#FFEB3B", color: "#C62828", fontSize: 10, fontWeight: 800, padding: "1px 6px", borderRadius: 6 }}>{t("আসল দাম", "Original")}</span>
              </div>
            </div>
          </div>

          {/* Big price */}
          <div style={{ marginTop: 14, textAlign: "center" }}>
            <div style={{ fontSize: 11, color: SD_COLORS.muted, fontWeight: 600 }}>{t("আপনার বর্তমান মূল্য", "Your price right now")}</div>
            <div style={{ position: "relative", display: "inline-block", marginTop: 2 }}>
              <span style={{ fontSize: 44, fontWeight: 900, color: isFree ? SD_COLORS.primary : "#C62828", letterSpacing: -1, lineHeight: 1 }}>
                {isFree ? t("ফ্রি!", "FREE!") : `৳${remaining}`}
              </span>
              {lastCut && (
                <span style={{ position: "absolute", top: -10, right: -50, color: SD_COLORS.primary, fontSize: 18, fontWeight: 800, animation: "sdCutPop 1.6s ease-out forwards", pointerEvents: "none" }}>
                  -৳{lastCut}
                </span>
              )}
            </div>
            <div style={{ fontSize: 11, color: SD_COLORS.primary, fontWeight: 700, marginTop: 4 }}>
              {t(`আপনি ইতিমধ্যে ৳${cutAmount} কেটেছেন (${pct.toFixed(0)}%)`, `You've cut ৳${cutAmount} (${pct.toFixed(0)}%)`)}
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ marginTop: 10, height: 12, background: "#FFE0B2", borderRadius: 6, overflow: "hidden", position: "relative", border: "1px solid #FFB74D" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: "linear-gradient(90deg,#FFD600,#FF6D00,#C62828)", transition: "width 0.6s cubic-bezier(0.2,0.8,0.2,1)", borderRadius: 6 }} />
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, color: "#1A1A1A", letterSpacing: 0.5 }}>
              {isFree ? `🎉 ${t("সম্পূর্ণ!", "COMPLETE!")}` : `${pct.toFixed(0)}% / 100%`}
            </div>
          </div>

          {/* Stats row */}
          <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
            <div style={{ flex: 1, background: "#FFF8E1", borderRadius: 10, padding: "8px 4px", textAlign: "center", border: "1px solid #FFE082" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#F57F17" }}>{friendsHelped}</div>
              <div style={{ fontSize: 9, color: SD_COLORS.muted, fontWeight: 600 }}>{t("বন্ধু সাহায্য করেছে", "friends helped")}</div>
            </div>
            <div style={{ flex: 1, background: "#FFEBEE", borderRadius: 10, padding: "8px 4px", textAlign: "center", border: "1px solid #FFCDD2" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#C62828" }}>{friendsNeeded}</div>
              <div style={{ fontSize: 9, color: SD_COLORS.muted, fontWeight: 600 }}>{t("আরও দরকার", "more needed")}</div>
            </div>
            <div style={{ flex: 1.2, background: "#E8F5F0", borderRadius: 10, padding: "8px 4px", textAlign: "center", border: "1px solid #C8E6C9" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: SD_COLORS.primary, fontFamily: "monospace" }}>{fmtTime(timeLeft)}</div>
              <div style={{ fontSize: 9, color: SD_COLORS.muted, fontWeight: 600 }}>{t("সময় বাকি", "time left")}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Scrollable body */}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 110 }}>
        {/* "How it works" strip */}
        <div style={{ background: "#fff", margin: "10px 12px 0", borderRadius: 14, padding: "12px 14px", border: "1px solid #FFE082" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#F57F17", marginBottom: 8 }}>{t("কীভাবে কাজ করে", "How it works")}</div>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 6 }}>
            {[
              ["1️⃣", t("লিংক শেয়ার", "Share link")],
              ["2️⃣", t("বন্ধু কাটে", "Friends cut")],
              ["3️⃣", t("৳০ হলে ফ্রি", "Hit ৳0 = free")],
            ].map(([emoji, txt], i) => (
              <div key={i} style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontSize: 22 }}>{emoji}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#555", marginTop: 2, lineHeight: 1.3 }}>{txt}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Helpers list */}
        <div style={{ background: "#fff", margin: "10px 12px 0", borderRadius: 14, overflow: "hidden" }}>
          <div style={{ padding: "12px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: 13, fontWeight: 800 }}>👥 {t("কাটাকাটি দল", "Cutting Crew")}</div>
            <div style={{ fontSize: 11, color: SD_COLORS.primary, fontWeight: 700 }}>{helpers.length} {t("জন", "people")}</div>

          {helpers.slice(0, 6).map((h, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderTop: "1px solid #F5F5F5" }}>
              <SDAvatar name={h.name} size={36} ring={h.self} style={h.self ? {borderColor:"#F57F17"} : {}}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 700 }}>
                  {h.name}
                  {h.self && <span style={{ marginLeft: 6, background: "#F57F17", color: "#fff", fontSize: 8, padding: "1px 5px", borderRadius: 4, fontWeight: 700 }}>{t("আপনি", "YOU")}</span>}
                </div>
                <div style={{ fontSize: 10, color: SD_COLORS.muted }}>{h.time}</div>
              </div>
              <div style={{ background: SD_COLORS.primaryLight, color: SD_COLORS.primary, fontSize: 12, fontWeight: 800, padding: "4px 10px", borderRadius: 8 }}>-৳{h.amount}</div>
            </div>
          ))}
        </div>

        {/* Sim "tap from a friend" — for the prototype */}
        <div onClick={simulateHelp} style={{ margin: "10px 12px 0", background: tapping ? "#FFD600" : "#FFFDE7", borderRadius: 14, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10, cursor: isFree ? "default" : "pointer", border: "1.5px dashed #F57F17", opacity: isFree ? 0.5 : 1, transition: "all 0.2s" }}>
          <span style={{ fontSize: 26 }}>{tapping ? "✂️" : "👋"}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: "#F57F17" }}>
              {tapping ? t("একজন বন্ধু কাটছে...", "A friend is cutting...") : t("একজন বন্ধুর সাহায্য সিমুলেট করুন", "Simulate a friend's help")}
            </div>
            <div style={{ fontSize: 10, color: SD_COLORS.muted, marginTop: 1 }}>{t("(প্রোটোটাইপ ডেমো)", "(prototype demo)")}</div>

        {/* Reward ladder — incentives along the way */}
        <div style={{ margin: "10px 12px 0", background: "#fff", borderRadius: 14, padding: "12px 14px" }}>
          <div style={{ fontSize: 13, fontWeight: 800, marginBottom: 10 }}>🏆 {t("মাইলফলক বোনাস", "Milestone Bonuses")}</div>
          {[
            [50, t("৫০% কাটা = ১০০ কয়েন", "50% cut = 100 coins"), "🪙"],
            [80, t("৮০% কাটা = ফ্রি শিপিং", "80% cut = free shipping"), "🚚"],
            [100, t("১০০% কাটা = পণ্য ফ্রি", "100% cut = product free"), "🎁"],

                <div style={{ flex: 1, fontSize: 12, fontWeight: hit ? 700 : 500, color: hit ? SD_COLORS.primary : "#555" }}>{txt}</div>
                <div style={{ fontSize: 11, color: SD_COLORS.muted, fontWeight: 700 }}>{thresh}%</div>
              </div>
            );
          })}
        </div>

        <div style={{ textAlign: "center", padding: "14px 16px 4px", fontSize: 10, color: SD_COLORS.muted, lineHeight: 1.5 }}>
          {t("প্রতি ব্যবহারকারী দিনে ১টি কাটাকাটি · সময় শেষ হলে অগ্রগতি হারাবে",
            "1 bargain per user per day · Progress lost if timer expires")}
        </div>
      </div>

      {/* Sticky share CTA */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid #EEE", padding: "10px 14px 24px", boxShadow: "0 -4px 16px rgba(0,0,0,0.08)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          {shareChannels.map(ch => (
            <div key={ch.label} onClick={()=>{
                fireToast && fireToast({icon:ch.icon,title:t(`${ch.label}-এ শেয়ার`,`Shared via ${ch.label}`),sub:t("বন্ধুরা ট্যাপ করলে দাম কাটবে","Friends will help cut the price")});
                // Demo: simulate one friend tap from this share
                setTimeout(()=>simulateHelp(), 800);
              }} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", flex: 1 }}>
              <div style={{ width: 42, height: 42, borderRadius: 12, background: ch.primary ? ch.color : ch.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, border: ch.primary ? "none" : `1px solid ${ch.color}30`, boxShadow: ch.primary ? "0 3px 10px " + ch.color + "55" : "none" }}>{ch.icon}</div>
              <span style={{ fontSize: 9, fontWeight: 700, color: ch.primary ? ch.color : "#555" }}>{ch.label}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <div onClick={() => fireToast({ icon: "💬", title: t("WhatsApp-এ পাঠানো হয়েছে", "Sent to WhatsApp"), sub: t("বন্ধুদের কাছে কাটতে বলুন!", "Ask friends to cut!"), color: "#25D366" })}
            style={{ flex:1.6, background: "linear-gradient(90deg,#25D366,#1EA952)", color: "#fff", borderRadius: 14, padding: "13px 0", textAlign: "center", fontSize: 13, fontWeight: 800, cursor: "pointer", boxShadow: "0 4px 14px rgba(37,211,102,0.4)" }}>
            💬 {t(`শেয়ার ${friendsNeeded} বন্ধুকে`, `Share to ${friendsNeeded} friends`)}
          </div>
          {!isFree && pct > 5 && (
            <div onClick={() => onNav("cart", { mode: "solo", product: { ...p, soloPrice: remaining, groupPrice: remaining, name: p.name + " " + t("(কাটা দাম)","(bargained)") } })}
              style={{ flex:1, background: SD_COLORS.red, color: "#fff", borderRadius: 14, padding: "13px 0", textAlign: "center", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
              🛒 {t(`কিনুন ৳${remaining}`, `Buy ৳${remaining}`)}
            </div>
          )}
        </div>
      </div>

      {/* Free-won celebration modal */}
      {showFreeModal && (
        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 24 }}>
          <div style={{ background: "linear-gradient(135deg,#006A4E,#009688)", borderRadius: 22, padding: 24, textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.5)", border: "3px solid #FFD600", maxWidth: 320 }}>
            <div style={{ fontSize: 56 }}>🎉</div>
            <div style={{ color: "#FFD600", fontSize: 22, fontWeight: 900, marginTop: 8 }}>{t("আপনি জিতলেন!", "YOU WON IT FREE!")}</div>
            <div style={{ color: "#fff", fontSize: 13, marginTop: 6, lineHeight: 1.5 }}>{t(`${p.name} এখন আপনার — ৳০!`, `${p.name} is yours — ৳0!`)}</div>
            <div style={{ marginTop: 16, background: "rgba(255,255,255,0.15)", borderRadius: 12, padding: 10, color: "#fff", fontSize: 11 }}>

            </div>
            <div onClick={() => { setShowFreeModal(false); onNav("cart", { mode: "solo", product: { ...p, soloPrice: 0, groupPrice: 0, name: p.name + " " + t("(ফ্রি জিতেছেন)","(won free)") } }); }} style={{ marginTop: 16, background: "#FFD600", color: "#1A1A1A", borderRadius: 14, padding: "12px 0", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>

          25% { opacity: 1; transform: translateY(-6px) scale(1.2); }
          100% { opacity: 0; transform: translateY(-40px) scale(1); }
        }
      `}</style>
